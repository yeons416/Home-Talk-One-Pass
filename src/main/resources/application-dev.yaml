    driver-class-name: com.mysql.cj.jdbc.Driver
  security:
    oauth2: # 1. oauth를 oauth2로 수정
      client:
        registration:
          kakao: # 2. 대소문자 구분을 위해 소문자 권장
            client-id: 4ad79c0bcd4a2a0ab2ac8b3d0fb76b76
            client-secret: k8NJmdYf0NQAD0JShTsmevgS5Q4qzz2s
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
            scope:
              - profile_nickname
              - account_email
            client-name: Kakao
        provider: # 3. registration과 같은 라인으로 밖으로 빼기
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id


  # SQL 초기화 스크립트 설정
  sql:
    init:
      mode: never       # never: 스크립트 실행 안 함 | always: 매 기동 시 실행
      encoding: UTF-8
  jpa:
    defer-datasource-initialization: true   # datasource 초기화 후 data.sql 실행(순서 보장)
    hibernate:
      ddl-auto: update
    show-sql: false

  thymeleaf:
    cache: false

logging:
  level:
    root: INFO        # 전체 기본 로그 레벨
    com.hometalk: DEBUG     # 프로젝트 패키지 - 상세 로그 출력
    org.hibernate.SQL: DEBUG    # hibernate SQL 쿼리 로그

file:
  upload:
    path: ./uploads