<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="/css/main.css" th:href="@{/css/dashboard/style.css}">
</head>
<body>
<div class="main-layout" style="display: flex; min-height: 100vh;">

    <!-- 1. 왼쪽 사이드바 -->
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <!-- 2. 오른쪽 영역 (헤더 + 본문) -->
    <div class="main-wrapper" style="flex: 1; display: flex; flex-direction: column;">

        <!-- 상단 헤더 -->
        <div th:replace="~{fragments/header :: header}"></div>

        <!-- 메인 콘텐츠 -->
        <main class="content" style="flex: 1;">
            <div style="min-height: 930px;">
                <h1>대시보드 홈 화면 입니다.</h1>
            </div>
        </main>

        <!-- 하단 푸터 삽입 -->
        <footer th:replace="~{fragments/footer :: footer}"></footer>

    </div>
</div>
</body>
</html>
