<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>차량 승인 관리</title>
  <meta name="_csrf" th:content="${_csrf.token}">
  <meta name="_csrf_header" th:content="${_csrf.headerName}">
</head>

<body>

<div class="container">
  <h2>차량 승인 관리</h2>

  <div>
    <button type="button" onclick="switchTab('PENDING', event)">대기</button>
    <button type="button" onclick="switchTab('APPROVED', event)">승인</button>
    <button type="button" onclick="switchTab('REJECTED', event)">반려</button>
  </div>

  <hr/>

  <table border="1">
    <thead>
    <tr>
      <th>차량 번호</th>
      <th>등록자</th>
      <th>세대</th>
      <th>등록일</th>
      <th>서류</th>
      <th>관리</th>
    </tr>
    </thead>
    <tbody id="vehicleList">
    <tr>
      <td colspan="6">로딩 중...</td>
    </tr>
    </tbody>
  </table>
</div>

<div id="documentModal" style="display:none;">
  <div>
    <h3>증빙 서류</h3>
    <img id="documentImage"
         src=""
         alt="서류 이미지"
         style="max-width: 400px;"
         onerror="this.style.display='none'; document.getElementById('documentError').style.display='block'">
    <p id="documentError" style="display:none;">서류를 불러올 수 없습니다.</p>
    <button onclick="closeDocumentModal()">닫기</button>
  </div>
</div>

<div id="rejectModal" style="display:none;">
  <div>
    <h3>반려 사유</h3>
    <textarea id="rejectReason" placeholder="반려 사유를 입력하세요"></textarea>
    <p id="rejectReasonError" style="color:red;"></p>
    <button onclick="closeRejectModal()">취소</button>
    <button onclick="confirmReject()">반려</button>
  </div>
</div>

<script th:inline="javascript">
  const contextPath = /*[[@{/}]]*/ '/';
  const csrfToken = document.querySelector('meta[name="_csrf"]').content;
  const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;

  let currentStatus = 'PENDING';
  let selectedApprovalId = null;

  function postFetch(url, body) {
    return fetch(url, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        [csrfHeader]: csrfToken
      },
      body: JSON.stringify(body)
    });
  }

  function switchTab(status, e) {
    currentStatus = status;
    document.querySelectorAll('button').forEach(btn => btn.classList.remove('active'));
    e.currentTarget.classList.add('active');
    loadVehicleList();
  }

  function loadVehicleList() {
    const tbody = document.getElementById('vehicleList');
    tbody.innerHTML = `<tr><td colspan="6">로딩 중...</td></tr>`;

    fetch(`${contextPath}admin/vehicle/approval/list?status=${currentStatus}`)
      .then(res => res.json())
      .then(data => {
        tbody.innerHTML = '';

        if (data.length === 0) {
          tbody.innerHTML = `<tr><td colspan="6">데이터가 없습니다.</td></tr>`;
          return;
        }

        data.forEach(v => {
          const docPath = v.documentPath ? v.documentPath.replace(/\\/g, '/') : null;
          const row = `
            <tr>
              <td>${v.vehicleNumber}</td>
              <td>${v.userName}</td>
              <td>${v.household}</td>
              <td>${v.createdAt}</td>
              <td>
                ${docPath
                  ? `<button onclick="viewDocument('${docPath}')">보기</button>`
                  : '없음'}
              </td>
              <td>
                ${currentStatus === 'PENDING' ? `
                  <button onclick="approveVehicle(${v.approvalId})">승인</button>
                  <button onclick="openRejectModal(${v.approvalId})">반려</button>
                ` : ''}
              </td>
            </tr>
          `;
          tbody.innerHTML += row;
        });
      })
      .catch(err => {
        console.error(err);
        tbody.innerHTML = `<tr><td colspan="6">데이터 조회 실패</td></tr>`;
      });
  }

  function viewDocument(path) {
    document.getElementById('documentImage').src = path;
    document.getElementById('documentModal').style.display = 'block';
  }

  function closeDocumentModal() {
    document.getElementById('documentModal').style.display = 'none';
  }

  function approveVehicle(approvalId) {
    if (!confirm('승인하시겠습니까?')) return;

    postFetch(`${contextPath}admin/vehicle/approval/approve`, { approvalId })
      .then(() => {
        alert('승인 완료');
        loadVehicleList();
      })
      .catch(err => {
        console.error(err);
        alert('승인 실패');
      });
  }

  function openRejectModal(approvalId) {
    selectedApprovalId = approvalId;
    document.getElementById('rejectReason').value = '';
    document.getElementById('rejectReasonError').innerText = '';
    document.getElementById('rejectModal').style.display = 'block';
  }

  function closeRejectModal() {
    document.getElementById('rejectModal').style.display = 'none';
  }

  function confirmReject() {
    const reason = document.getElementById('rejectReason').value.trim();

    if (!reason) {
      document.getElementById('rejectReasonError').innerText = '반려 사유를 입력해주세요.';
      return;
    }

    postFetch(`${contextPath}admin/vehicle/approval/reject`, {
      approvalId: selectedApprovalId,
      rejectReason: reason
    })
      .then(() => {
        alert('반려 완료');
        closeRejectModal();
        loadVehicleList();
      })
      .catch(err => {
        console.error(err);
        alert('반려 실패');
      });
  }

  loadVehicleList();
</script>

</body>
</html>
