<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>차량 티켓 등록</title>
  <style>
    /* CSS는 나중에 추가 */
  </style>
</head>
<body>

<div class="container">
  <h2 class="page-title">차량 티켓 등록</h2>

  <!-- 차량 번호 검색 -->
  <div class="form-group">
    <label for="vehicleNumber">차량 번호</label>
    <div class="search-group">
      <input
              type="text"
              id="vehicleNumber"
              placeholder="차량 번호 4자리 입력"
              maxlength="4"
      >
      <button type="button" id="searchBtn" onclick="searchVehicle()">조회</button>
    </div>
    <span class="error-msg" id="searchError"></span>
  </div>

  <!-- 검색 결과 -->
  <div id="searchResult" class="hidden">

    <!-- 차량 정보 -->
    <div class="vehicle-info-box">
      <p><span class="label">차량번호</span><span id="resultVehicleNumber"></span></p>
      <p><span class="label">입차일시</span><span id="resultEntryTime"></span></p>
      <p><span class="label">주차시간</span><span id="resultParkingTime"></span></p>

      <!-- 미등록 차량일 때 -->
      <div id="unregisteredBox" class="hidden">
        <span class="warning">*미등록된 차량입니다. →</span>
        <button type="button" onclick="goRegister()">내 손님으로 등록하기</button>
      </div>
    </div>

    <!-- 주차 시간 계산 -->
    <div class="time-calc-box">
      <div class="time-item">
        <span class="time-label">주차시간</span>
        <span id="totalTime" class="time-value"></span>
      </div>
      <div class="time-item">
        <span class="time-label">입력시간</span>
        <span id="appliedTime" class="time-value"></span>
      </div>
      <div class="time-item">
        <span class="time-label">남은시간</span>
        <span id="remainingTime" class="time-value"></span>
      </div>
    </div>

    <!-- 티켓 적용 -->
    <div class="ticket-section">
      <label>티켓 적용</label>
      <p class="hint">*적용할 티켓을 선택해주세요</p>

      <div class="ticket-list">
        <!-- 1일권 -->
        <div class="ticket-item">
          <label>
            <input type="radio" name="ticketType" value="DAY" onchange="selectTicket('DAY')">
            1일권
          </label>
          <span id="dayRemaining"></span>
          <button type="button" class="cancel-ticket-btn hidden"
                  id="dayCancelBtn" onclick="cancelTicket('DAY')">적용 취소</button>
        </div>

        <!-- 1시간권 -->
        <div class="ticket-item">
          <label>
            <input type="radio" name="ticketType" value="HOUR" onchange="selectTicket('HOUR')">
            1시간권
          </label>
          <span id="hourRemaining"></span>
          <button type="button" class="cancel-ticket-btn hidden"
                  id="hourCancelBtn" onclick="cancelTicket('HOUR')">적용 취소</button>
        </div>
      </div>

      <!-- 수량 조절 + 적용 버튼 -->
      <div class="ticket-apply-group">
        <button type="button" onclick="decreaseCount()">-</button>
        <span id="ticketCount">1</span>
        <button type="button" onclick="increaseCount()">+</button>
        <button type="button" id="applyBtn" disabled onclick="applyTicket()">적용</button>
      </div>
      <p class="hint" id="ticketHint"></p>
    </div>
  </div>
</div>

<script>
  let selectedParkingId = null;
  let selectedTicketType = null;
  let ticketCount = 1;
  let maxCount = 0;

  // 숫자만 입력
  document.getElementById('vehicleNumber').addEventListener('input', (e) => {
      e.target.value = e.target.value.replace(/\D/g, '');
  });

  // 엔터키로 조회
  document.getElementById('vehicleNumber').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') searchVehicle();
  });

  // 차량 조회
  function searchVehicle() {
      const keyword = document.getElementById('vehicleNumber').value.trim();
      const searchError = document.getElementById('searchError');

      if (keyword.length !== 4) {
          searchError.textContent = '차량 번호 4자리를 입력해주세요.';
          return;
      }
      searchError.textContent = '';

      fetch(`/parking/ticket/search?keyword=${keyword}`)
          .then(res => res.json())
          .then(data => {
              if (!data) {
                  searchError.textContent = '조회된 차량이 없습니다.';
                  document.getElementById('searchResult').classList.add('hidden');
                  return;
              }

              selectedParkingId = data.parkingId;

              // 차량 정보 표시
              document.getElementById('resultVehicleNumber').textContent = data.vehicleNumber;
              document.getElementById('resultEntryTime').textContent = data.entryTime;
              document.getElementById('resultParkingTime').textContent = data.parkingTime;

              // 주차 시간 계산
              document.getElementById('totalTime').textContent = data.totalTime;
              document.getElementById('appliedTime').textContent = data.appliedTime;
              document.getElementById('remainingTime').textContent = data.remainingTime;

              // 티켓 잔여 수량
              document.getElementById('dayRemaining').textContent = `이번 달 남은 ${data.dayRemaining}개`;
              document.getElementById('hourRemaining').textContent = `이번 달 남은 ${data.hourRemaining}분`;

              // 미등록 차량 여부
              if (data.unregistered) {
                  document.getElementById('unregisteredBox').classList.remove('hidden');
              } else {
                  document.getElementById('unregisteredBox').classList.add('hidden');
              }

              document.getElementById('searchResult').classList.remove('hidden');
          });
  }

  // 티켓 선택
  function selectTicket(type) {
      selectedTicketType = type;
      ticketCount = 1;
      document.getElementById('ticketCount').textContent = ticketCount;

      if (type === 'DAY') {
          maxCount = parseInt(document.getElementById('dayRemaining').textContent);
          document.getElementById('ticketHint').textContent = '*티켓 시간이 부족합니다. 티켓을 추가해주세요';
      } else {
          maxCount = parseInt(document.getElementById('hourRemaining').textContent);
      }

      document.getElementById('applyBtn').disabled = false;
  }

  // 수량 증가
  function increaseCount() {
      if (ticketCount < maxCount) {
          ticketCount++;
          document.getElementById('ticketCount').textContent = ticketCount;
      }
  }

  // 수량 감소
  function decreaseCount() {
      if (ticketCount > 1) {
          ticketCount--;
          document.getElementById('ticketCount').textContent = ticketCount;
      }
  }

  // 티켓 적용
  function applyTicket() {
      if (!selectedParkingId || !selectedTicketType) return;

      fetch('/parking/ticket/apply', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
              parkingId: selectedParkingId,
              ticketType: selectedTicketType,
              count: ticketCount
          })
      }).then(res => {
          if (res.ok) {
              alert('티켓이 적용되었습니다.');
              searchVehicle();

              // 적용 취소 버튼 표시
              if (selectedTicketType === 'DAY') {
                  document.getElementById('dayCancelBtn').classList.remove('hidden');
              } else {
                  document.getElementById('hourCancelBtn').classList.remove('hidden');
              }
          } else {
              alert('티켓 적용 중 오류가 발생했습니다.');
          }
      });
  }

  // 티켓 취소
  function cancelTicket(type) {
      if (!confirm('티켓 적용을 취소하시겠습니까?')) return;

      fetch('/parking/ticket/cancel', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
              parkingId: selectedParkingId,
              ticketType: type
          })
      }).then(res => {
          if (res.ok) {
              alert('티켓 적용이 취소되었습니다.');
              searchVehicle();

              if (type === 'DAY') {
                  document.getElementById('dayCancelBtn').classList.add('hidden');
              } else {
                  document.getElementById('hourCancelBtn').classList.add('hidden');
              }
          } else {
              alert('취소 처리 중 오류가 발생했습니다.');
          }
      });
  }

  // 미등록 차량 등록 페이지로 이동
  function goRegister() {
      location.href = '/parking/unregistered';
  }
</script>

</body>
</html>
