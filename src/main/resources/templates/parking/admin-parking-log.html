<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>전체 주차 기록 조회</title>
  <style>
    /* CSS는 나중에 추가 */
  </style>
</head>
<body>

<div class="container">
  <h2 class="page-title">전체 주차 기록 조회</h2>

  <!-- 필터 영역 -->
  <div class="filter-group">

    <!-- 년/월 선택 -->
    <div class="dropdown-wrapper">
      <button type="button" id="yearBtn" onclick="toggleYearDropdown()">
        <span id="selectedYear"></span> ▼
      </button>
      <div id="yearDropdown" style="display:none;">
        <ul id="yearList"></ul>
      </div>
    </div>

    <div class="dropdown-wrapper">
      <button type="button" id="monthBtn" onclick="toggleMonthDropdown()">
        <span id="selectedMonth"></span> ▼
      </button>
      <div id="monthDropdown" style="display:none;">
        <ul id="monthList"></ul>
      </div>
    </div>

    <!-- 차량 구분 필터 -->
    <div class="dropdown-wrapper">
      <button type="button" id="typeBtn" onclick="toggleTypeDropdown()">
        <span id="selectedType">전체</span> ▼
      </button>
      <div id="typeDropdown" style="display:none;">
        <ul>
          <li onclick="selectType('ALL', '전체')">전체</li>
          <li onclick="selectType('RESIDENT', '입주자 차량')">입주자 차량</li>
          <li onclick="selectType('VISITOR', '방문 차량')">방문 차량</li>
        </ul>
      </div>
    </div>

    <!-- 세대 검색 -->
    <div class="search-group">
      <input type="text" id="householdSearch" placeholder="동/호수 검색">
      <button type="button" onclick="loadParkingLogs()">검색</button>
    </div>

  </div>

  <!-- 주차 기록 테이블 -->
  <table id="parkingTable">
    <thead>
    <tr>
      <th>차량 번호</th>
      <th>세대</th>
      <th>등록구분</th>
      <th>입차시간</th>
      <th>출차시간</th>
      <th>주차시간</th>
      <th>정산내역</th>
    </tr>
    </thead>
    <tbody id="parkingList">
    <tr>
      <td colspan="7">주차 기록이 없습니다.</td>
    </tr>
    </tbody>
  </table>
</div>

<script>
  const YEARS  = [2026,2025,2024,2023,2022,2021,2020,2019,2018];
  const MONTHS = ["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];
  const TODAY  = new Date();

  let selectedYear = TODAY.getFullYear();
  let selectedMonth = TODAY.getMonth() + 1;
  let selectedType = 'ALL';

  // 페이지 로드 시 현재 년/월 초기화
  document.getElementById('selectedYear').textContent = `${selectedYear}년`;
  document.getElementById('selectedMonth').textContent = `${selectedMonth}월`;

  // 년 목록 생성
  const yearList = document.getElementById('yearList');
  YEARS.forEach(y => {
      const li = document.createElement('li');
      li.textContent = `${y}년`;
      li.addEventListener('click', () => {
          selectedYear = y;
          document.getElementById('selectedYear').textContent = `${y}년`;
          toggleYearDropdown();
          loadParkingLogs();
      });
      yearList.appendChild(li);
  });

  // 월 목록 생성
  const monthList = document.getElementById('monthList');
  MONTHS.forEach((m, index) => {
      const li = document.createElement('li');
      li.textContent = m;
      li.addEventListener('click', () => {
          selectedMonth = index + 1;
          document.getElementById('selectedMonth').textContent = m;
          toggleMonthDropdown();
          loadParkingLogs();
      });
      monthList.appendChild(li);
  });

  // 차량 구분 선택
  function selectType(type, label) {
      selectedType = type;
      document.getElementById('selectedType').textContent = label;
      toggleTypeDropdown();
      loadParkingLogs();
  }

  // 년 드롭다운 토글
  function toggleYearDropdown() {
      const dropdown = document.getElementById('yearDropdown');
      dropdown.style.display = dropdown.style.display === 'none' ? 'block' : 'none';
      document.getElementById('monthDropdown').style.display = 'none';
      document.getElementById('typeDropdown').style.display = 'none';
  }

  // 월 드롭다운 토글
  function toggleMonthDropdown() {
      const dropdown = document.getElementById('monthDropdown');
      dropdown.style.display = dropdown.style.display === 'none' ? 'block' : 'none';
      document.getElementById('yearDropdown').style.display = 'none';
      document.getElementById('typeDropdown').style.display = 'none';
  }

  // 차량 구분 드롭다운 토글
  function toggleTypeDropdown() {
      const dropdown = document.getElementById('typeDropdown');
      dropdown.style.display = dropdown.style.display === 'none' ? 'block' : 'none';
      document.getElementById('yearDropdown').style.display = 'none';
      document.getElementById('monthDropdown').style.display = 'none';
  }

  // 외부 클릭 시 드롭다운 닫기
  document.addEventListener('click', (e) => {
      if (!e.target.closest('#yearBtn') && !e.target.closest('#yearDropdown')) {
          document.getElementById('yearDropdown').style.display = 'none';
      }
      if (!e.target.closest('#monthBtn') && !e.target.closest('#monthDropdown')) {
          document.getElementById('monthDropdown').style.display = 'none';
      }
      if (!e.target.closest('#typeBtn') && !e.target.closest('#typeDropdown')) {
          document.getElementById('typeDropdown').style.display = 'none';
      }
  });

  // 주차 기록 조회
  function loadParkingLogs() {
      const household = document.getElementById('householdSearch').value.trim();

      fetch(`/admin/parking/logs?year=${selectedYear}&month=${selectedMonth}&type=${selectedType}&household=${household}`)
          .then(res => res.json())
          .then(data => {
              const parkingList = document.getElementById('parkingList');
              parkingList.innerHTML = '';

              if (data.length === 0) {
                  parkingList.innerHTML = '<tr><td colspan="7">주차 기록이 없습니다.</td></tr>';
                  return;
              }

              data.forEach(log => {
                  const row = document.createElement('tr');
                  row.innerHTML = `
                      <td>${log.vehicleNumber}</td>
                      <td>${log.household ?? '-'}</td>
                      <td>${log.vehicleType}</td>
                      <td>${log.entryTime}</td>
                      <td>${log.exitTime ?? '주차 중'}</td>
                      <td>${log.parkingTime ?? '-'}</td>
                      <td>${log.settlement}</td>
                  `;
                  parkingList.appendChild(row);
              });
          });
  }

  // 페이지 로드 시 기록 조회
  loadParkingLogs();
</script>

</body>
</html>
