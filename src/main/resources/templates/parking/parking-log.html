<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>주차 기록 조회</title>
  <style>
    /* CSS는 나중에 추가 */
  </style>
</head>
<body>

<div class="container">
  <h2 class="page-title">주차 기록 조회</h2>

  <!-- 년/월 선택 -->
  <div class="date-filter">

    <!-- 년 선택 -->
    <div class="dropdown-wrapper">
      <button type="button" id="yearBtn" onclick="toggleYearDropdown()">
        <span id="selectedYear"></span> ▼
      </button>
      <div id="yearDropdown" class="dropdown" style="display:none;">
        <ul id="yearList"></ul>
      </div>
    </div>

    <!-- 월 선택 -->
    <div class="dropdown-wrapper">
      <button type="button" id="monthBtn" onclick="toggleMonthDropdown()">
        <span id="selectedMonth"></span> ▼
      </button>
      <div id="monthDropdown" class="dropdown" style="display:none;">
        <ul id="monthList"></ul>
      </div>
    </div>

  </div>

  <!-- 주차 기록 테이블 -->
  <table id="parkingTable">
    <thead>
    <tr>
      <th>차량 번호</th>
      <th>입차시간</th>
      <th>출차시간</th>
      <th>등록구분</th>
      <th>정산내역</th>
    </tr>
    </thead>
    <tbody id="parkingList">
    <tr>
      <td colspan="5">주차 기록이 없습니다.</td>
    </tr>
    </tbody>
  </table>
</div>

<script>
  let selectedYear = new Date().getFullYear();
  let selectedMonth = new Date().getMonth() + 1;

  // 페이지 로드 시 현재 년/월로 버튼 텍스트 초기화
  document.getElementById('selectedYear').textContent = `${selectedYear}년`;
  document.getElementById('selectedMonth').textContent = `${selectedMonth}월`;

  // 년 목록 생성 (최근 3년)
  const yearList = document.getElementById('yearList');
  for (let y = selectedYear; y >= selectedYear - 2; y--) {
      const li = document.createElement('li');
      li.textContent = `${y}년`;
      li.addEventListener('click', () => {
          selectedYear = y;
          document.getElementById('selectedYear').textContent = `${y}년`;
          toggleYearDropdown();
          loadParkingLogs();
      });
      yearList.appendChild(li);
  }

  // 월 목록 생성
  const monthList = document.getElementById('monthList');
  for (let m = 1; m <= 12; m++) {
      const li = document.createElement('li');
      li.textContent = `${m}월`;
      li.addEventListener('click', () => {
          selectedMonth = m;
          document.getElementById('selectedMonth').textContent = `${m}월`;
          toggleMonthDropdown();
          loadParkingLogs();
      });
      monthList.appendChild(li);
  }

  // 년 드롭다운 토글
  function toggleYearDropdown() {
      const dropdown = document.getElementById('yearDropdown');
      dropdown.style.display = dropdown.style.display === 'none' ? 'block' : 'none';
      document.getElementById('monthDropdown').style.display = 'none';
  }

  // 월 드롭다운 토글
  function toggleMonthDropdown() {
      const dropdown = document.getElementById('monthDropdown');
      dropdown.style.display = dropdown.style.display === 'none' ? 'block' : 'none';
      document.getElementById('yearDropdown').style.display = 'none';
  }

  // 외부 클릭 시 드롭다운 닫기
  document.addEventListener('click', (e) => {
      if (!e.target.closest('#yearBtn') && !e.target.closest('#yearDropdown')) {
          document.getElementById('yearDropdown').style.display = 'none';
      }
      if (!e.target.closest('#monthBtn') && !e.target.closest('#monthDropdown')) {
          document.getElementById('monthDropdown').style.display = 'none';
      }
  });

  // 주차 기록 조회
  function loadParkingLogs() {
      fetch(`/parking/logs?year=${selectedYear}&month=${selectedMonth}`)
          .then(res => res.json())
          .then(data => {
              const parkingList = document.getElementById('parkingList');
              parkingList.innerHTML = '';

              if (data.length === 0) {
                  parkingList.innerHTML = '<tr><td colspan="5">주차 기록이 없습니다.</td></tr>';
                  return;
              }

              data.forEach(log => {
                  const row = document.createElement('tr');
                  row.innerHTML = `
                      <td>${log.vehicleNumber}</td>
                      <td>${log.entryTime}</td>
                      <td>${log.exitTime ?? '주차 중'}</td>
                      <td>${log.vehicleType}</td>
                      <td>${log.settlement}</td>
                  `;
                  parkingList.appendChild(row);
              });
          });
  }

  // 페이지 로드 시 현재 년/월 기록 조회
  loadParkingLogs();
</script>

</body>
</html>
