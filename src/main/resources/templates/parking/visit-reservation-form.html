<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>방문 차량 예약</title>
  <meta name="_csrf" th:content="${_csrf.token}">
  <meta name="_csrf_header" th:content="${_csrf.headerName}">
  <style>
    /* CSS는 나중에 추가 */
  </style>
</head>
<body>

<div class="container">

  <h2 class="page-title" th:text="${reservation != null} ? '방문 차량 예약 수정' : '방문 차량 예약'"></h2>

  <!-- 차량 번호 -->
  <div class="form-group">
    <label for="vehicleNumber">차량 번호</label>
    <input type="text" id="vehicleNumber" name="vehicleNumber"
           placeholder="예) 123가4567" maxlength="10"
           th:value="${reservation?.vehicleNumber}">
    <span class="error-msg" id="vehicleNumberError"></span>
  </div>

  <!-- 방문 목적 -->
  <div class="form-group">
    <label for="purpose">방문 목적</label>
    <input type="text" id="purpose" name="purpose"
           placeholder="방문 목적을 입력하세요."
           th:value="${reservation?.purpose}">
    <span class="error-msg" id="purposeError"></span>
  </div>

  <!-- 방문 예정 시각 -->
  <div class="form-group">
    <label>방문 예정 시각</label>
    <div class="datetime-group">
      <select id="year">
        <option value="">년</option>
        <option th:each="y : ${years}" th:value="${y}" th:text="${y}"
                th:selected="${reservation != null and reservation.reservedAt.year == y}">
        </option>
      </select>
      <select id="month">
        <option value="">월</option>
        <option th:each="m : ${months}" th:value="${m}" th:text="${m}"
                th:selected="${reservation != null and reservation.reservedAt.monthValue == m}">
        </option>
      </select>
      <select id="day">
        <option value="">일</option>
        <option th:each="d : ${days}" th:value="${d}" th:text="${d}"
                th:selected="${reservation != null and reservation.reservedAt.dayOfMonth == d}">
        </option>
      </select>
      <select id="hour">
        <option value="">시</option>
        <option th:each="h : ${hours}" th:value="${h}" th:text="${h}"
                th:selected="${reservation != null and reservation.reservedAt.hour == h}">
        </option>
      </select>
      <select id="minute">
        <option value="">분</option>
        <option th:each="min : ${minutes}" th:value="${min}" th:text="${min}"
                th:selected="${reservation != null and reservation.reservedAt.minute == min}">
        </option>
      </select>
    </div>
    <span class="error-msg" id="datetimeError"></span>
  </div>

  <!-- 버튼 -->
  <div class="form-actions">
    <button type="button"
            th:onclick="'location.href=\'' + @{/parking/visit} + '\''">취소</button>
    <button type="button" id="submitBtn" disabled
            th:text="${reservation != null} ? '수정' : '등록'"
            onclick="submitForm()">
    </button>
  </div>
</div>

<script th:inline="javascript">
  const csrfToken = document.querySelector('meta[name="_csrf"]').content;
  const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;
  const contextPath = /*[[@{/}]]*/ '/';
  const vehicleNumberRegex = /^\d{2,3}[가-힣]\d{4}$/;

  const householdId = 1;
  const reservationId = [[${reservation != null ? reservation.reservationId : null}]];
  const isUpdate = reservationId !== null;

  const vehicleNumberInput = document.getElementById('vehicleNumber');
  const vehicleNumberError = document.getElementById('vehicleNumberError');
  const purposeInput = document.getElementById('purpose');
  const purposeError = document.getElementById('purposeError');
  const datetimeError = document.getElementById('datetimeError');

  vehicleNumberInput.addEventListener('input', () => {
      const value = vehicleNumberInput.value.replace(/\s/g, '');
      if (value && !vehicleNumberRegex.test(value)) {
          vehicleNumberError.textContent = '올바른 차량 번호 형식이 아닙니다. (예: 123가4567)';
      } else {
          vehicleNumberError.textContent = '';
      }
      checkSubmitBtn();
  });

  purposeInput.addEventListener('input', () => {
      if (purposeInput.value.trim() === '') {
          purposeError.textContent = '방문 목적을 입력해주세요.';
      } else {
          purposeError.textContent = '';
      }
      checkSubmitBtn();
  });

  ['year', 'month', 'day', 'hour', 'minute'].forEach(id => {
      document.getElementById(id).addEventListener('change', checkSubmitBtn);
  });

  function checkSubmitBtn() {
      const vehicleNumber = vehicleNumberInput.value.replace(/\s/g, '');
      const purpose = purposeInput.value.trim();
      const year = document.getElementById('year').value;
      const month = document.getElementById('month').value;
      const day = document.getElementById('day').value;
      const hour = document.getElementById('hour').value;
      const minute = document.getElementById('minute').value;

      const isValidNumber = vehicleNumberRegex.test(vehicleNumber);
      const isValidPurpose = purpose !== '';
      const isValidDatetime = year && month && day && hour && minute;

      document.getElementById('submitBtn').disabled =
              !(isValidNumber && isValidPurpose && isValidDatetime);
  }

  function submitForm() {
      const year = document.getElementById('year').value;
      const month = String(document.getElementById('month').value).padStart(2, '0');
      const day = String(document.getElementById('day').value).padStart(2, '0');
      const hour = String(document.getElementById('hour').value).padStart(2, '0');
      const minute = String(document.getElementById('minute').value).padStart(2, '0');

      const reservedAt = `${year}-${month}-${day}T${hour}:${minute}:00`;
      const now = new Date();
      const selectedDate = new Date(reservedAt);

      if (selectedDate <= now) {
          datetimeError.textContent = '방문 예정 시각은 현재 이후여야 합니다.';
          return;
      }

      datetimeError.textContent = '';

      const url = isUpdate
              ? `${contextPath}parking/visit/update/${reservationId}`
              : `${contextPath}parking/visit/register/${householdId}`;

      fetch(url, {
          method: 'POST',
          headers: {
              'Content-Type': 'application/json',
              [csrfHeader]: csrfToken
          },
          body: JSON.stringify({
              vehicleNumber: vehicleNumberInput.value.replace(/\s/g, ''),
              purpose: purposeInput.value.trim(),
              reservedAt: reservedAt
          })
      })
      .then(async res => {
          if (!res.ok) {
              const msg = await res.text();
              throw new Error(msg || '서버 오류');
          }
          location.href = `${contextPath}parking/visit`;
      })
      .catch(err => {
          console.error(err);
          alert('처리 중 오류가 발생했습니다.');
      });
  }

  window.onload = checkSubmitBtn;
</script>

</body>
</html>
