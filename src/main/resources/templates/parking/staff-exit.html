<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>출차</title>
  <meta name="_csrf" th:content="${_csrf.token}">
  <meta name="_csrf_header" th:content="${_csrf.headerName}">
  <style>
    /* CSS는 나중에 추가 */
  </style>
</head>
<body>

<div class="container">

  <!-- 출차 처리 퀵서치 -->
  <div class="section">
    <h2 class="page-title">출차</h2>

    <!-- 차량 번호 검색 -->
    <div class="form-group">
      <label for="vehicleNumber">차량 번호</label>
      <div class="search-group">
        <input
                type="text"
                id="vehicleNumber"
                placeholder="차량 번호 4자리 입력"
                maxlength="4"
        >
        <button type="button" onclick="searchVehicle()">조회</button>
      </div>
      <span class="error-msg" id="searchError"></span>
    </div>

    <!-- 검색 결과 -->
    <div id="searchResult"></div>
  </div>

  <!-- 주차 중인 차량 목록 -->
  <div class="section">
    <h2 class="page-title">주차 중인 차량 목록</h2>

    <!-- 탭 -->
    <div class="tab-group">
      <button type="button" class="tab-btn active" onclick="switchTab('visit')">방문 차량</button>
      <button type="button" class="tab-btn" onclick="switchTab('resident')">입주자 차량</button>
    </div>

    <!-- 방문 차량 탭 -->
    <div id="visitTab">
      <table>
        <thead>
        <tr>
          <th>차량 번호</th>
          <th>방문세대</th>
          <th>방문목적</th>
          <th>방문 예정 시각</th>
          <th>상태</th>
          <th>관리</th>
        </tr>
        </thead>
        <tbody id="visitList">
        <tr>
          <td colspan="6">주차 중인 방문 차량이 없습니다.</td>
        </tr>
        </tbody>
      </table>
    </div>

    <!-- 입주자 차량 탭 -->
    <div id="residentTab" style="display:none;">
      <table>
        <thead>
        <tr>
          <th>차량 번호</th>
          <th>세대</th>
          <th>등록자</th>
          <th>입차 시간</th>
          <th>상태</th>
          <th>관리</th>
        </tr>
        </thead>
        <tbody id="residentList">
        <tr>
          <td colspan="6">주차 중인 입주자 차량이 없습니다.</td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script>
  const csrfToken = document.querySelector('meta[name="_csrf"]').content;
  const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;

  // 공통 fetch POST 함수
  function postFetch(url, body) {
    return fetch(url, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        [csrfHeader]: csrfToken
      },
      body: JSON.stringify(body)
    });
  }

  // 탭 전환
  function switchTab(type) {
    const tabBtns = document.querySelectorAll('.tab-btn');
    tabBtns.forEach(btn => btn.classList.remove('active'));

    if (type === 'visit') {
      document.querySelector('.tab-btn:first-child').classList.add('active');
      document.getElementById('visitTab').style.display = 'block';
      document.getElementById('residentTab').style.display = 'none';
    } else {
      document.querySelector('.tab-btn:last-child').classList.add('active');
      document.getElementById('visitTab').style.display = 'none';
      document.getElementById('residentTab').style.display = 'block';
    }
  }

  // 숫자만 입력, 4자리 되면 자동 조회
  document.getElementById('vehicleNumber').addEventListener('input', (e) => {
    e.target.value = e.target.value.replace(/\D/g, '');
    if (e.target.value.length === 4) searchVehicle();
  });

  // 엔터키로 조회
  document.getElementById('vehicleNumber').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') searchVehicle();
  });

  // 차량 조회
  function searchVehicle() {
    const keyword = document.getElementById('vehicleNumber').value.trim();
    const searchError = document.getElementById('searchError');

    if (keyword.length !== 4) {
      searchError.textContent = '차량 번호 4자리를 입력해주세요.';
      return;
    }
    searchError.textContent = '';

    fetch(`/staff/exit/search?keyword=${keyword}`)
            .then(res => res.json())
            .then(data => {
              const searchResult = document.getElementById('searchResult');
              searchResult.innerHTML = '';

              if (data.length === 0) {
                searchResult.innerHTML = '<p>조회된 차량이 없습니다.</p>';
                return;
              }

              data.forEach(vehicle => {
                const div = document.createElement('div');
                div.classList.add('result-item');

                if (vehicle.canExit) {
                  div.innerHTML = `
                            <p>*결과 : ${vehicle.household} ${vehicle.purpose} 차량입니다.</p>
                            <ul>
                                <li>주차 시간 : ${vehicle.parkingTime}</li>
                                <li>등록 티켓 : ${vehicle.ticketInfo}</li>
                                <li>판정 : <span class="can-exit">[출차 가능]</span></li>
                            </ul>
                            <button type="button" class="exit-btn"
                                    onclick="processExit(${vehicle.parkingId})">출차 처리</button>
                        `;
                } else {
                  div.innerHTML = `
                            <p>*결과 : ${vehicle.household} ${vehicle.purpose} 차량입니다.</p>
                            <ul>
                                <li>주차 시간 : ${vehicle.parkingTime}</li>
                                <li>등록 티켓 : ${vehicle.ticketInfo}</li>
                                <li>판정 : <span class="cannot-exit">[출차 불가]</span></li>
                            </ul>
                            <button type="button" class="notify-btn"
                                    onclick="sendNotification(${vehicle.parkingId})">알림보내기</button>
                        `;
                }

                searchResult.appendChild(div);
              });
            });
  }

  // 출차 처리
  function processExit(parkingId) {
    if (!confirm('출차 처리하시겠습니까?')) return;

    postFetch('/staff/exit/process', { parkingId: parkingId })
            .then(res => {
              if (res.ok) {
                alert('출차 처리가 완료되었습니다.');
                document.getElementById('vehicleNumber').value = '';
                document.getElementById('searchResult').innerHTML = '';
                loadParkingList();
              } else {
                alert('출차 처리 중 오류가 발생했습니다.');
              }
            });
  }

  // 알림 보내기
  function sendNotification(parkingId) {
    postFetch('/staff/exit/notify', { parkingId: parkingId })
            .then(res => {
              if (res.ok) {
                alert('알림이 발송되었습니다.');
              } else {
                alert('알림 발송 중 오류가 발생했습니다.');
              }
            });
  }

  // 주차 중인 차량 목록 조회
  function loadParkingList() {
    // 방문 차량 목록
    fetch('/staff/exit/list/visit')
            .then(res => res.json())
            .then(data => {
              const visitList = document.getElementById('visitList');
              visitList.innerHTML = '';

              if (data.length === 0) {
                visitList.innerHTML = '<tr><td colspan="6">주차 중인 방문 차량이 없습니다.</td></tr>';
                return;
              }

              data.forEach(vehicle => {
                const row = document.createElement('tr');
                row.innerHTML = `
                        <td>${vehicle.vehicleNumber}</td>
                        <td>${vehicle.household ?? '-'}</td>
                        <td>${vehicle.purpose ?? '-'}</td>
                        <td>${vehicle.reservedAt ?? '-'}</td>
                        <td>${!vehicle.canExit ? '<span class="cannot-exit">[출차 불가]</span>' : ''}</td>
                        <td>
                            <button type="button" class="exit-btn"
                                    onclick="processExit(${vehicle.parkingId})">출차 처리</button>
                            ${!vehicle.canExit
                        ? `<button type="button" class="notify-btn"
                                           onclick="sendNotification(${vehicle.parkingId})">알림보내기</button>`
                        : ''}
                        </td>
                    `;
                visitList.appendChild(row);
              });
            });

    // 입주자 차량 목록
    fetch('/staff/exit/list/resident')
            .then(res => res.json())
            .then(data => {
              const residentList = document.getElementById('residentList');
              residentList.innerHTML = '';

              if (data.length === 0) {
                residentList.innerHTML = '<tr><td colspan="6">주차 중인 입주자 차량이 없습니다.</td></tr>';
                return;
              }

              data.forEach(vehicle => {
                const row = document.createElement('tr');
                row.innerHTML = `
                        <td>${vehicle.vehicleNumber}</td>
                        <td>${vehicle.household}</td>
                        <td>${vehicle.userName}</td>
                        <td>${vehicle.entryTime}</td>
                        <td>${!vehicle.canExit ? '<span class="cannot-exit">[출차 불가]</span>' : ''}</td>
                        <td>
                            <button type="button" class="exit-btn"
                                    onclick="processExit(${vehicle.parkingId})">출차 처리</button>
                            ${!vehicle.canExit
                        ? `<button type="button" class="notify-btn"
                                           onclick="sendNotification(${vehicle.parkingId})">알림보내기</button>`
                        : ''}
                        </td>
                    `;
                residentList.appendChild(row);
              });
            });
  }

  // 페이지 로드 시 목록 조회
  loadParkingList();
</script>

</body>
</html>
