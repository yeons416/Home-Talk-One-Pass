<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>출차</title>
  <meta name="_csrf" th:content="${_csrf.token}">
  <meta name="_csrf_header" th:content="${_csrf.headerName}">
  <style>
    /* CSS는 나중에 추가 */
  </style>
</head>
<body>

<div class="container">

  <!-- 출차 처리 퀵서치 -->
  <div class="section">
    <h2 class="page-title">출차</h2>

    <div class="form-group">
      <label for="vehicleNumber">차량 번호</label>
      <div class="search-group">
        <input
                type="text"
                id="vehicleNumber"
                placeholder="차량 번호 4자리 입력"
                maxlength="4"
        >
        <button type="button" onclick="searchVehicle()">조회</button>
      </div>
      <span class="error-msg" id="searchError"></span>
    </div>

    <div id="searchResult"></div>
  </div>

  <!-- 주차 중인 차량 목록 -->
  <div class="section">
    <h2 class="page-title">주차 중인 차량 목록</h2>

    <!-- 탭 -->
    <div class="tab-group">
      <button type="button" class="tab-btn active" id="visitTabBtn" onclick="switchTab('visit', event)">방문 차량</button>
      <button type="button" class="tab-btn" id="residentTabBtn" onclick="switchTab('resident', event)">입주자 차량</button>
    </div>

    <!-- 방문 차량 탭 -->
    <div id="visitTab">
      <table>
        <thead>
        <tr>
          <th>차량 번호</th>
          <th>방문세대</th>
          <th>방문목적</th>
          <th>방문 예정 시각</th>
          <th>상태</th>
          <th>관리</th>
        </tr>
        </thead>
        <tbody id="visitList">
        <tr>
          <td colspan="6">주차 중인 방문 차량이 없습니다.</td>
        </tr>
        </tbody>
      </table>
    </div>

    <!-- 입주자 차량 탭 -->
    <div id="residentTab" style="display:none;">
      <table>
        <thead>
        <tr>
          <th>차량 번호</th>
          <th>세대</th>
          <th>등록자</th>
          <th>입차 시간</th>
          <th>상태</th>
          <th>관리</th>
        </tr>
        </thead>
        <tbody id="residentList">
        <tr>
          <td colspan="6">주차 중인 입주자 차량이 없습니다.</td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script>
  const csrfToken = document.querySelector('meta[name="_csrf"]').content;
  const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;
  let isProcessing = false;

  // 공통 fetch POST 함수
  function postFetch(url, body) {
      return fetch(url, {
          method: 'POST',
          headers: {
              'Content-Type': 'application/json',
              [csrfHeader]: csrfToken
          },
          body: JSON.stringify(body)
      });
  }

  // 탭 전환
  function switchTab(type, e) {
      const tabBtns = document.querySelectorAll('.tab-btn');
      tabBtns.forEach(btn => btn.classList.remove('active'));
      e.currentTarget.classList.add('active');

      if (type === 'visit') {
          document.getElementById('visitTab').style.display = 'block';
          document.getElementById('residentTab').style.display = 'none';
      } else {
          document.getElementById('visitTab').style.display = 'none';
          document.getElementById('residentTab').style.display = 'block';
      }
  }

  // 숫자만 입력, 4자리 되면 자동 조회
  document.getElementById('vehicleNumber').addEventListener('input', (e) => {
      e.target.value = e.target.value.replace(/\D/g, '');
      if (e.target.value.length === 4) searchVehicle();
  });

  // 엔터키로 조회
  document.getElementById('vehicleNumber').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') searchVehicle();
  });

  // 차량 조회
  function searchVehicle() {
      const keyword = document.getElementById('vehicleNumber').value.trim();
      const searchError = document.getElementById('searchError');

      if (keyword.length !== 4) {
          searchError.textContent = '차량 번호 4자리를 입력해주세요.';
          return;
      }
      searchError.textContent = '';

      fetch(`/staff/exit/search?keyword=${keyword}`)
          .then(async res => {
              if (!res.ok) {
                  const msg = await res.text();
                  throw new Error(msg || '서버 오류');
              }
              return res.json();
          })
          .then(data => {
              const searchResult = document.getElementById('searchResult');
              searchResult.innerHTML = '';

              if (data.length === 0) {
                  searchResult.innerHTML = '<p>조회된 차량이 없습니다.</p>';
                  return;
              }

              data.forEach(vehicle => {
                  const div = document.createElement('div');
                  div.classList.add('result-item');

                  if (vehicle.canExit) {
                      div.innerHTML = `
                          <p>*결과 : ${vehicle.household} ${vehicle.purpose} 차량입니다.</p>
                          <ul>
                              <li>주차 시간 : ${vehicle.parkingTime}</li>
                              <li>등록 티켓 : ${vehicle.ticketInfo}</li>
                              <li>판정 : <span class="can-exit">[출차 가능]</span></li>
                          </ul>
                          <button type="button" class="exit-btn"
                                  onclick="processExit(${vehicle.parkingId}, this)">출차 처리</button>
                      `;
                  } else {
                      div.innerHTML = `
                          <p>*결과 : ${vehicle.household} ${vehicle.purpose} 차량입니다.</p>
                          <ul>
                              <li>주차 시간 : ${vehicle.parkingTime}</li>
                              <li>등록 티켓 : ${vehicle.ticketInfo}</li>
                              <li>판정 : <span class="cannot-exit">[출차 불가]</span></li>
                          </ul>
                          <button type="button" class="notify-btn"
                                  onclick="sendNotification(${vehicle.parkingId}, this)">알림보내기</button>
                      `;
                  }

                  searchResult.appendChild(div);
              });
          })
          .catch(err => {
              console.error(err);
              document.getElementById('searchError').textContent = '조회 중 오류가 발생했습니다.';
          });
  }

  // 출차 처리
  function processExit(parkingId, btn) {
      if (isProcessing) return;
      if (!confirm('출차 처리하시겠습니까?')) return;

      isProcessing = true;
      btn.disabled = true;

      postFetch('/staff/exit/process', { parkingId: parkingId })
          .then(async res => {
              if (!res.ok) {
                  const msg = await res.text();
                  throw new Error(msg || '서버 오류');
              }
              alert('출차 처리가 완료되었습니다.');
              document.getElementById('vehicleNumber').value = '';
              document.getElementById('searchResult').innerHTML = '';
              loadParkingList();
          })
          .catch(err => {
              console.error(err);
              alert('출차 처리 중 오류가 발생했습니다.');
          })
          .finally(() => {
              isProcessing = false;
              btn.disabled = false;
          });
  }

  // 알림 보내기
  function sendNotification(parkingId, btn) {
      if (isProcessing) return;

      isProcessing = true;
      btn.disabled = true;

      postFetch('/staff/exit/notify', { parkingId: parkingId })
          .then(async res => {
              if (!res.ok) {
                  const msg = await res.text();
                  throw new Error(msg || '서버 오류');
              }
              alert('알림이 발송되었습니다.');
          })
          .catch(err => {
              console.error(err);
              alert('알림 발송 중 오류가 발생했습니다.');
          })
          .finally(() => {
              isProcessing = false;
              btn.disabled = false;
          });
  }

  // 주차 중인 차량 목록 조회
  function loadParkingList() {
      const visitList = document.getElementById('visitList');
      const residentList = document.getElementById('residentList');

      visitList.innerHTML = '<tr><td colspan="6">로딩 중...</td></tr>';
      residentList.innerHTML = '<tr><td colspan="6">로딩 중...</td></tr>';

      // 방문 차량 목록
      fetch('/staff/exit/list/visit')
          .then(async res => {
              if (!res.ok) {
                  const msg = await res.text();
                  throw new Error(msg || '서버 오류');
              }
              return res.json();
          })
          .then(data => {
              visitList.innerHTML = '';

              if (data.length === 0) {
                  visitList.innerHTML = '<tr><td colspan="6">주차 중인 방문 차량이 없습니다.</td></tr>';
                  return;
              }

              data.forEach(vehicle => {
                  const row = document.createElement('tr');
                  row.innerHTML = `
                      <td>${vehicle.vehicleNumber}</td>
                      <td>${vehicle.household ?? '-'}</td>
                      <td>${vehicle.purpose ?? '-'}</td>
                      <td>${vehicle.reservedAt ?? '-'}</td>
                      <td>${!vehicle.canExit ? '<span class="cannot-exit">[출차 불가]</span>' : ''}</td>
                      <td>
                          <button type="button" class="exit-btn"
                                  onclick="processExit(${vehicle.parkingId}, this)">출차 처리</button>
                          ${!vehicle.canExit
                              ? `<button type="button" class="notify-btn"
                                         onclick="sendNotification(${vehicle.parkingId}, this)">알림보내기</button>`
                              : ''}
                      </td>
                  `;
                  visitList.appendChild(row);
              });
          })
          .catch(err => {
              console.error(err);
              visitList.innerHTML = '<tr><td colspan="6">데이터 조회 중 오류가 발생했습니다.</td></tr>';
          });

      // 입주자 차량 목록
      fetch('/staff/exit/list/resident')
          .then(async res => {
              if (!res.ok) {
                  const msg = await res.text();
                  throw new Error(msg || '서버 오류');
              }
              return res.json();
          })
          .then(data => {
              residentList.innerHTML = '';

              if (data.length === 0) {
                  residentList.innerHTML = '<tr><td colspan="6">주차 중인 입주자 차량이 없습니다.</td></tr>';
                  return;
              }

              data.forEach(vehicle => {
                  const row = document.createElement('tr');
                  row.innerHTML = `
                      <td>${vehicle.vehicleNumber}</td>
                      <td>${vehicle.household}</td>
                      <td>${vehicle.userName}</td>
                      <td>${vehicle.entryTime}</td>
                      <td>${!vehicle.canExit ? '<span class="cannot-exit">[출차 불가]</span>' : ''}</td>
                      <td>
                          <button type="button" class="exit-btn"
                                  onclick="processExit(${vehicle.parkingId}, this)">출차 처리</button>
                          ${!vehicle.canExit
                              ? `<button type="button" class="notify-btn"
                                         onclick="sendNotification(${vehicle.parkingId}, this)">알림보내기</button>`
                              : ''}
                      </td>
                  `;
                  residentList.appendChild(row);
              });
          })
          .catch(err => {
              console.error(err);
              residentList.innerHTML = '<tr><td colspan="6">데이터 조회 중 오류가 발생했습니다.</td></tr>';
          });
  }

  loadParkingList();
</script>

</body>
</html>
