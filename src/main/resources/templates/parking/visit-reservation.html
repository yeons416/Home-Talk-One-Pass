<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>방문 차량 예약</title>
    <style>
        /* CSS는 나중에 추가 */
    </style>
</head>
<body>

<div class="container">

    <!-- 상단 타이틀 + 예약하기 버튼 -->
    <div class="page-header">
        <h2 class="page-title">방문 차량 예약</h2>
        <a th:href="@{/parking/reservation/form}" class="add-btn">+ 예약하기</a>
    </div>

    <!-- 예약 목록 테이블 -->
    <table id="reservationTable">
        <thead>
        <tr>
            <th>차량 번호</th>
            <th>차량 모델</th>
            <th>방문 목적</th>
            <th>방문 예정 시각</th>
            <th>상태</th>
            <th>관리</th>
        </tr>
        </thead>
        <tbody>
        <!-- 예약 없을 때 -->
        <tr th:if="${#lists.isEmpty(reservations)}">
            <td colspan="6">예약된 방문 차량이 없습니다.</td>
        </tr>
        <!-- 예약 목록 -->
        <tr th:each="reservation : ${reservations}">
            <td th:text="${reservation.vehicleNumber}"></td>
            <td th:text="${reservation.vehicleModel}"></td>
            <td th:text="${reservation.purpose}"></td>
            <td th:text="${#temporals.format(reservation.reservedAt, 'yyyy.MM.dd HH:mm')}"></td>
            <td>
                    <span th:text="${reservation.status}"
                          th:classappend="${reservation.status.name() == 'RESERVED'} ? 'status reserved' :
                                         (${reservation.status.name() == 'ENTERED'} ? 'status entered' : 'status cancelled')">
                    </span>
            </td>
            <td>
                <!-- RESERVED 상태일 때만 수정/취소 버튼 표시 -->
                <th:block th:if="${reservation.status.name() == 'RESERVED'}">
                    <a th:href="@{/parking/reservation/form/{id}(id=${reservation.reservationId})}"
                       class="edit-btn">수정</a>
                    <button class="cancel-btn"
                            th:attr="data-id=${reservation.reservationId}"
                            onclick="cancelReservation(this)">취소</button>
                </th:block>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<script>
    function cancelReservation(btn) {
        const reservationId = btn.getAttribute('data-id');
        if (!confirm('예약을 취소하시겠습니까?')) return;

        fetch(`/parking/reservation/cancel/${reservationId}`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            }
        }).then(res => {
            if (res.ok) {
                location.reload();
            } else {
                alert('취소 처리 중 오류가 발생했습니다.');
            }
        });
    }
</script>

</body>
</html>
