<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>방문 차량 예약</title>
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <style>
        /* CSS는 나중에 추가 */
    </style>
</head>
<body>

<div class="container">

    <!-- 상단 타이틀 + 예약하기 버튼 -->
    <div class="page-header">
        <h2 class="page-title">방문 차량 예약</h2>
        <button type="button" onclick="location.href='/parking/reservation/form'">+ 예약하기</button>
    </div>

    <!-- 예약 목록 테이블 -->
    <table id="reservationTable">
        <thead>
        <tr>
            <th>차량 번호</th>
            <th>차량 모델</th>
            <th>방문 목적</th>
            <th>방문 예정 시각</th>
            <th>상태</th>
            <th>관리</th>
        </tr>
        </thead>
        <tbody id="reservationtbody">
        <!-- 예약 없을 때 -->
        <tr th:if="${#lists.isEmpty(reservations)}">
            <td colspan="6">예약된 방문 차량이 없습니다.</td>
        </tr>
        <!-- 예약 목록 -->
        <tr th:each="reservation : ${reservations}"
            th:id="'row-' + ${reservation.reservationId}">
            <td th:text="${reservation.vehicleNumber}"></td>
            <td th:text="${reservation.vehicleModel}"></td>
            <td th:text="${reservation.purpose}"></td>
            <td th:text="${#temporals.format(reservation.reservedAt, 'yyyy.MM.dd HH:mm')}"></td>
            <td>
                    <span th:text="${reservation.status.name() == 'RESERVED'} ? '예약중' :
                                   (${reservation.status.name() == 'ENTERED'} ? '입차완료' : '취소됨')"
                          th:class="${reservation.status.name() == 'RESERVED'} ? 'status reserved' :
                                    (${reservation.status.name() == 'ENTERED'} ? 'status entered' : 'status cancelled')">
                    </span>
            </td>
            <td>
                <th:block th:if="${reservation.status.name() == 'RESERVED'}">
                    <button type="button"
                            th:onclick="'location.href=\'/parking/reservation/form/' + ${reservation.reservationId} + '\''">
                        수정
                    </button>
                    <button type="button" class="cancel-btn"
                            th:attr="data-id=${reservation.reservationId}"
                            onclick="cancelReservation(this)">취소</button>
                </th:block>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<script>
    const csrfToken = document.querySelector('meta[name="_csrf"]').content;
    const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;

    function cancelReservation(btn) {
        const reservationId = btn.getAttribute('data-id');
        if (!confirm('예약을 취소하시겠습니까?')) return;

        fetch(`/parking/reservation/${reservationId}/cancel`, {
            method: 'DELETE',
            headers: {
                [csrfHeader]: csrfToken
            }
        }).then(res => {
            if (res.ok) {
                const row = document.getElementById(`row-${reservationId}`);
                if (!row) return;
                const statusCell = row.querySelector('td:nth-child(5) span');
                const actionCell = row.querySelector('td:nth-child(6)');

                statusCell.textContent = '취소됨';
                statusCell.className = 'status cancelled';
                actionCell.innerHTML = '';
            } else {
                alert('취소 처리 중 오류가 발생했습니다.');
            }
        });
    }
</script>

</body>
</html>
