<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원가입 - Home Talk One Pass</title>
    <style>
        .auth-container { width: 400px; margin: 20px auto; text-align: center; border: 1px solid #bdbaba; padding: 20px; border-radius: 8px; }
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #bdbaba; border-radius: 4px; height: 50px; }
        button { width: 100%; padding: 12px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #218838; }

        .address-group label {margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        .address-group input{width: 65%; margin-right: 10px;}
        .address-group button{width: 30%;}
        .address-detail{ display: flex; justify-content: left; margin-bottom: 10px; font-weight: bold; font-size: 14px;  }
    </style>
</head>
<body>

<div class="auth-container">
    <h2>회원가입</h2>
    <p>서비스 이용을 위해 정보를 입력해주세요.</p>

    <!-- *{} = 객체를 전달받은 경우 매핑    -->
    <form th:action="@{/auth/register/signup}" th:object="${signUpDTO}" method="post">
        <input type="hidden" name="currentStep" th:value="${step}" />

        <div th:if="${step == 1}">
            <div class="input-group">
                <label for="email">이메일</label>
                <input type="email" th:field="*{email}" placeholder="example@hometalk.com" required>
            </div>

            <div class="input-group">
                <label for="loginId">아이디</label>
                <input type="text" th:field="*{loginId}" placeholder="아이디를 입력하세요" required>
            </div>

            <div class="input-group">
                <label for="phoneNumber">연락처</label>
                <input type="text" th:field="*{phoneNumber}" placeholder="휴대폰 번호(-)제외" required>
            </div>

            <div class="input-group">
                <label for="password">비밀번호</label>
                <input type="password" th:field="*{password}" placeholder="비밀번호를 입력하세요" required>
            </div>

            <div class="input-group">
                <label for="name">이름</label>
                <input type="text" th:field="*{name}" placeholder="실명을 입력하세요" required>
            </div>

            <div class="input-group">
                <label for="nickname">별명</label>
                <input type="text" th:field="*{nickname}" placeholder="별명을 입력해주세요" required>
            </div>

            <button type="submit" name="action" value="next">다음</button>
        </div>

        <div th:if="${step == 2}">
            <input type="hidden" th:field="*{email}">
            <input type="hidden" th:field="*{loginId}">
            <input type="hidden" th:field="*{phoneNumber}">
            <input type="hidden" th:field="*{password}">
            <input type="hidden" th:field="*{name}">
            <input type="hidden" th:field="*{nickname}">

            <div class="input-group">
                <label for="postNum">주소</label>
                <div class="address-group">
                    <input type="text" th:field="*{postNum}" id="postNum" placeholder="우편 번호를 입력하세요">
                    <button type="button" onclick="execDaumPostcode()"> 우편번호 찾기 </button>
                </div>
            </div>


            <div class="input-group">
                <label for="buildingName"></label>
                <input type="text" th:field="*{buildingName}"  id="buildingName" placeholder="주소를 입력하세요">
            </div>

            <span class="address-detail">
                상세 주소
            </span>

            <div class="input-group">
                <label for="dong">동</label>
                <input type="text" th:field="*{dong}" placeholder="동을 입력하세요 (ex 102동 -> 102 입력)">
            </div>

            <div class="input-group">
                <label for="ho">호</label>
                <input type="text" th:field="*{ho}" placeholder="호를 입력하세요 (ex 201호 -> 301 입력)">
            </div>

            <div style="display: flex; gap: 10px;">
                <button type="submit" name="action" value="prev">이전</button>
                <button type="submit" name="action" value="complete">가입 완료</button>
            </div>
        </div>
    </form>
</div>




<script src="//t1.kakaocdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
<script>
    function execDaumPostcode() {
        new kakao.Postcode({
            oncomplete: function(data) {
                // 팝업에서 검색결과 항목을 클릭했을때 실행할 코드를 작성하는 부분.

                // 각 주소의 노출 규칙에 따라 주소를 조합한다.
                // 내려오는 변수가 값이 없는 경우엔 공백('')값을 가지므로, 이를 참고하여 분기 한다.
                var addr = ''; // 주소 변수
                var extraAddr = ''; // 참고항목 변수

                //사용자가 선택한 주소 타입에 따라 해당 주소 값을 가져온다.
                if (data.userSelectedType === 'R') { // 사용자가 도로명 주소를 선택했을 경우
                    addr = data.roadAddress;
                } else { // 사용자가 지번 주소를 선택했을 경우(J)
                    addr = data.jibunAddress;
                }

                // 사용자가 선택한 주소가 도로명 타입일때 참고항목을 조합한다.
                if(data.userSelectedType === 'R') {
                    // 법정동명이 있을 경우 추가한다. (법정리는 제외)
                    // 법정동의 경우 마지막 문자가 "동/로/가"로 끝난다.
                    if (data.bname !== '' && /[동로가]$/.test(data.bname)) {
                        extraAddr += data.bname;
                    }
                    // 건물명이 있고, 공동주택일 경우 추가한다.
                    if (data.buildingName !== '' && data.apartment === 'Y') {
                        extraAddr += (extraAddr !== '' ? ', ' + data.buildingName : data.buildingName);
                    }
                    // 표시할 참고항목이 있을 경우, 괄호까지 추가한 최종 문자열을 만든다.
                    if (extraAddr !== '') {
                        extraAddr = ' (' + extraAddr + ')';
                    }
                }

                // 우편번호와 주소 정보를 해당 필드에 넣는다.
                document.getElementById('postNum').value = data.zonecode;
                document.getElementById('buildingName').value = addr + extraAddr;

                // 주소 입력 후 바로 '동' 입력창으로 포커스 이동 (사용자 편의)
                document.getElementsByName('dong')[0].focus();
            }
        }).open();
    }
</script>
</body>
</html>
