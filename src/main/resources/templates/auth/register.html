<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원가입 - Home Talk One Pass</title>
    <style>
        .auth-container { width: 350px; margin: 50px auto; text-align: center; border: 1px solid #ddd; padding: 20px; border-radius: 8px; }
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 12px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #218838; }
        .link-group { margin-top: 20px; font-size: 14px; }
    </style>
</head>
<body>

<div class="auth-container">
    <h2>회원가입</h2>
    <p>서비스 이용을 위해 정보를 입력해주세요.</p>

    <form th:action="@{/auth/register}" method="post">
        <div class="input-group">
            <label for="username">아이디</label>
            <input type="text" id="username" name="username" placeholder="아이디를 입력하세요" required>
        </div>

        <div class="input-group">
            <label for="password">비밀번호</label>
            <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" required>
        </div>

        <div class="input-group">
            <label for="name">이름</label>
            <input type="text" id="name" name="name" placeholder="실명을 입력하세요" required>
        </div>

        <div class="input-group">
            <label for="email">이메일</label>
            <input type="email" id="email" name="email" placeholder="example@hometalk.com" required>
        </div>

        <button type="submit">가입하기</button>
    </form>
</div>

</body>
</html>
