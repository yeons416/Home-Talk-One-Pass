<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>일정</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            padding: 20px;
        }


        .cal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .nav-side { display: flex; align-items: center; gap: 10px; }

        .nav-btn {
            background: white;
            border: 1px solid #d0d1d8;
            border-radius: 50%;
            width: 34px; height: 34px;
            cursor: pointer;
            font-size: 12px;
            color: #444;
            display: flex; align-items: center; justify-content: center;
        }

        .nav-btn:hover { background: #e8ebf0; }

        .cal-title { font-size: 26px; font-weight: 500; }

        .today-btn {
            background: white;
            border: 1px solid #d0d1d8;
            border-radius: 20px;
            padding: 3px 10px;
            font-size: 13px;
            cursor: pointer;
        }

        .year-month-sel { display: flex; gap: 6px; }

        .year-month-sel select {
            border: 1px solid #d0d1d8;
            border-radius: 4px;
            padding: 4px 10px;
            font-size: 13px;
            background: white;
            cursor: pointer;
        }


        .today-bar {
            background: #686868;
            border-radius: 7px;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 16px;
        }

        .today-bar-label { color: #ffffff; font-size: 11px; }
        .today-bar-date { color: white; font-size: 17px; font-weight: 500; }
        .today-bar-events { display: flex; gap: 8px; flex-wrap: wrap; }
        .today-ev-empty { color: white; font-size: 13px; }


        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, minmax(0, 1fr));
            margin-bottom: 8px;
        }

        .weekday {
            text-align: center;
            font-size: 12px;
            color: #888;
            padding: 4px 0;
        }

        .weekday:first-child { color: #c55; }
        .weekday:last-child { color: #51587e; }


        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, minmax(0, 1fr));
            gap: 6px;
        }

        .day-cell {
            background: white;
            border-radius: 10px;
            min-height: 90px;
            padding: 10px 8px;
            cursor: pointer;
            border: 1.5px solid transparent;
        }

        .day-cell:hover { border-color: #51587e; }

        .day-num {
            font-size: 14px;
            font-weight: 500;
            width: 28px; height: 28px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%;
            margin-bottom: 6px;
        }

        .day-cell.today .day-num {
            background: #51587e;
            color: white;
        }


        .event-tag {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            margin-bottom: 3px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            background: #e0e0e0;
            color: #444;
        }


        .schedule-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.25);
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .schedule-modal.open { display: flex; }

        .modal-inner {
            background: white;
            border-radius: 16px;
            width: 300px;
            overflow: hidden;
        }

        .modal-header {
            background: #1a1c2e;
            color: white;
            padding: 14px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-date { font-size: 15px; font-weight: 500; }

        .btn-close {
            background: none;
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            border-radius: 6px;
            width: 24px; height: 24px;
            cursor: pointer;
            font-size: 11px;
        }

        .modal-content { padding: 16px; }

        .modal-content ul { list-style: none; }

        .modal-content ul li {
            padding: 8px 0;
            border-bottom: 1px solid #eee;
            font-size: 13px;
            color: #222;
        }

        .modal-content ul li:last-child { border-bottom: none; }

        .modal-content ul li a {
            display: block;
            font-size: 11px;
            color: #51587e;
            text-decoration: underline;
            margin-top: 3px;
        }
    </style>
</head>
<body>


<div class="cal-header">
    <div class="nav-side">
        <button type="button" class="nav-btn btn-prev">←</button>
        <span class="cal-title">2026년 3월</span>
        <button type="button" class="nav-btn btn-next">→</button>
    </div>
    <div class="nav-side">
        <div class="year-month-sel">
            <select name="year">
                <option>2026</option>
            </select>
            <select name="month">
                <option>3</option>
            </select>
        </div>
        <button type="button" class="today-btn">오늘</button>
    </div>
</div>


<div class="today-bar">
    <div>
        <div class="today-bar-label">오늘의 일정</div>
        <div class="today-bar-date">2026년 3월 23일</div>
    </div>
    <div class="today-bar-events">
        <span class="today-ev-empty">일정 없음</span>
    </div>
</div>


<div class="weekdays">
    <div class="weekday">일</div>
    <div class="weekday">월</div>
    <div class="weekday">화</div>
    <div class="weekday">수</div>
    <div class="weekday">목</div>
    <div class="weekday">금</div>
    <div class="weekday">토</div>
</div>

<!-- 달력 (날짜는 Thymeleaf로 동적 생성) -->
<div class="calendar-grid">
</div>


<div class="schedule-modal" id="scheduleModal">
    <div class="modal-inner">
        <div class="modal-header">
            <span class="modal-date">3월 4일</span>
            <button type="button" class="btn-close">X</button>
        </div>
        <div class="modal-content">
            <ul>
                <li>
                    동대표 선거 투표 시작
                    <a href="#">해당 페이지 바로가기</a>
                </li>
                <li>
                    방역: 수도 및 배관 소독
                    <a href="#">해당 페이지 바로가기</a>
                </li>
            </ul>
        </div>
    </div>
</div>

<!-- 임시: 모달 확인용 (나중에 삭제) -->
<button onclick="document.getElementById('scheduleModal').classList.add('open')">
    모달 열기
</button>

</body>
</html>
