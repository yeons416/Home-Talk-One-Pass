<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>일정 등록</title>

</head>
<body>

<!-- 헤더 -->
<div class="cal-header">
    <div class="nav-side">
        <button type="button" class="nav-btn btn-prev">←</button>
        <span class="cal-title">2026년 3월</span>
        <button type="button" class="nav-btn btn-next">→</button>
    </div>
    <div class="nav-side">
        <div class="year-month-sel">
            <select name="year"><option>2026</option></select>
            <select name="month"><option>3</option></select>
        </div>
        <button type="button" class="btn-schedule-add"
                onclick="document.getElementById('scheduleFormModal').classList.add('open')">
            일정 등록
        </button>
    </div>
</div>

<!-- 요일 -->
<div class="weekdays">
    <div class="weekday">일</div>
    <div class="weekday">월</div>
    <div class="weekday">화</div>
    <div class="weekday">수</div>
    <div class="weekday">목</div>
    <div class="weekday">금</div>
    <div class="weekday">토</div>
</div>

<!-- 달력 그리드 (날짜는 Thymeleaf로 동적 생성) -->
<div class="calendar-grid">
</div>

<!-- 일정 등록 모달 -->
<div class="schedule-form-modal" id="scheduleFormModal">
    <div class="modal-inner">
        <div class="modal-header">
            <span class="modal-title">일정 등록</span>
            <button type="button" class="btn-close"
                    onclick="document.getElementById('scheduleFormModal').classList.remove('open')">X</button>
        </div>
        <div class="modal-content">
            <table class="modal-form-table">
                <tr>
                    <td class="form-label">일정명</td>
                    <td><input type="text" name="scheduleName" placeholder="일정명을 입력하세요."></td>
                </tr>
                <tr>
                    <td class="form-label">시작</td>
                    <td>
                        <input type="date" name="startDate">
                        <select name="startHour"><option>00</option></select>
                        <select name="startMinute"><option>00</option></select>
                    </td>
                </tr>
                <tr>
                    <td class="form-label">종료</td>
                    <td>
                        <input type="date" name="endDate">
                        <select name="endHour"><option>23</option></select>
                        <select name="endMinute"><option>59</option></select>
                    </td>
                </tr>
                <tr>
                    <td class="form-label">설명</td>
                    <td><textarea name="scheduleDesc"></textarea></td>
                </tr>
                <tr>
                    <td class="form-label">URL</td>
                    <td><input type="text" name="scheduleUrl"></td>
                </tr>
            </table>
            <div class="form-bottom">
                <button type="button" class="btn-register">등록</button>
            </div>
        </div>
    </div>
</div>

</body>
</html>
