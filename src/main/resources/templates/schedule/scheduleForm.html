<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>일정 등록</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { padding: 20px; }

        .cal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .nav-side { display: flex; align-items: center; gap: 10px; }

        .nav-btn {
            background: white;
            border: 1px solid #d0d1d8;
            border-radius: 50%;
            width: 34px; height: 34px;
            cursor: pointer;
            font-size: 12px;
            color: #444;
            display: flex; align-items: center; justify-content: center;
        }

        .nav-btn:hover { background: #e8ebf0; }

        .cal-title { font-size: 26px; font-weight: 500; }

        .year-month-sel { display: flex; gap: 6px; }

        .year-month-sel select {
            border: 1px solid #d0d1d8;
            border-radius: 4px;
            padding: 4px 10px;
            font-size: 13px;
            background: white;
            cursor: pointer;
        }

        .btn-schedule-add {
            background: #51587e;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 7px 16px;
            font-size: 13px;
            cursor: pointer;
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, minmax(0, 1fr));
            margin-bottom: 8px;
        }

        .weekday {
            text-align: center;
            font-size: 12px;
            color: #888;
            padding: 4px 0;
        }

        .weekday:first-child { color: #c55; }
        .weekday:last-child { color: #51587e; }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, minmax(0, 1fr));
            gap: 6px;
        }

        .day-cell {
            background: white;
            border-radius: 10px;
            min-height: 90px;
            padding: 10px 8px;
            cursor: pointer;
            border: 1.5px solid transparent;
        }

        .day-cell:hover { border-color: #51587e; }

        .day-num {
            font-size: 14px;
            font-weight: 500;
            width: 28px; height: 28px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%;
            margin-bottom: 6px;
        }

        .day-cell.today .day-num {
            background: #51587e;
            color: white;
        }

        .event-tag {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            margin-bottom: 3px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            background: #e0e0e0;
            color: #444;
        }


        .schedule-form-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.25);
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .schedule-form-modal.open { display: flex; }

        .modal-inner {
            background: white;
            border-radius: 16px;
            width: 320px;
            overflow: hidden;
        }

        .modal-header {
            background: #1a1c2e;
            color: white;
            padding: 14px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title { font-size: 15px; font-weight: 500; }

        .btn-close {
            background: none;
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            border-radius: 6px;
            width: 24px; height: 24px;
            cursor: pointer;
            font-size: 11px;
        }

        .modal-content { padding: 16px; }

        .modal-form-table {
            width: 100%;
            border-collapse: collapse;
        }

        .modal-form-table td {
            padding: 6px 4px;
            font-size: 13px;
            vertical-align: middle;
        }

        .form-label {
            width: 50px;
            color: #444;
            white-space: nowrap;
        }

        .modal-form-table input[type="text"],
        .modal-form-table input[type="date"] {
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 12px;
        }

        .modal-form-table input[type="text"] { width: 100%; }

        .modal-form-table select {
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 4px;
            font-size: 12px;
        }

        .modal-form-table textarea {
            width: 100%;
            height: 70px;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 6px;
            font-size: 12px;
            resize: none;
            box-sizing: border-box;
        }

        .form-bottom {
            text-align: right;
            margin-top: 10px;
        }

        .btn-register {
            background: #51587e;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 6px 16px;
            font-size: 13px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<!-- 헤더 -->
<div class="cal-header">
    <div class="nav-side">
        <button type="button" class="nav-btn btn-prev">←</button>
        <span class="cal-title">2026년 3월</span>
        <button type="button" class="nav-btn btn-next">→</button>
    </div>
    <div class="nav-side">
        <div class="year-month-sel">
            <select name="year"><option>2026</option></select>
            <select name="month"><option>3</option></select>
        </div>
        <button type="button" class="btn-schedule-add"
                onclick="document.getElementById('scheduleFormModal').classList.add('open')">
            일정 등록
        </button>
    </div>
</div>

<!-- 요일 -->
<div class="weekdays">
    <div class="weekday">일</div>
    <div class="weekday">월</div>
    <div class="weekday">화</div>
    <div class="weekday">수</div>
    <div class="weekday">목</div>
    <div class="weekday">금</div>
    <div class="weekday">토</div>
</div>

<!-- 달력 그리드 (날짜는 Thymeleaf로 동적 생성) -->
<div class="calendar-grid">
</div>

<!-- 일정 등록 모달 -->
<div class="schedule-form-modal" id="scheduleFormModal">
    <div class="modal-inner">
        <div class="modal-header">
            <span class="modal-title">일정 등록</span>
            <button type="button" class="btn-close"
                    onclick="document.getElementById('scheduleFormModal').classList.remove('open')">X</button>
        </div>
        <div class="modal-content">
            <table class="modal-form-table">
                <tr>
                    <td class="form-label">일정명</td>
                    <td><input type="text" name="scheduleName" placeholder="일정명을 입력하세요."></td>
                </tr>
                <tr>
                    <td class="form-label">시작</td>
                    <td>
                        <input type="date" name="startDate">
                        <select name="startHour"><option>00</option></select>
                        <select name="startMinute"><option>00</option></select>
                    </td>
                </tr>
                <tr>
                    <td class="form-label">종료</td>
                    <td>
                        <input type="date" name="endDate">
                        <select name="endHour"><option>23</option></select>
                        <select name="endMinute"><option>59</option></select>
                    </td>
                </tr>
                <tr>
                    <td class="form-label">설명</td>
                    <td><textarea name="scheduleDesc"></textarea></td>
                </tr>
                <tr>
                    <td class="form-label">URL</td>
                    <td><input type="text" name="scheduleUrl"></td>
                </tr>
            </table>
            <div class="form-bottom">
                <button type="button" class="btn-register">등록</button>
            </div>
        </div>
    </div>
</div>

</body>
</html>
