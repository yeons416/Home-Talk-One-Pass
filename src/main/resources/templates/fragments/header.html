<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<!--
  * Fragment 스타일1 : 고정 레이아웃 (파라미터 없음)
    - 이 파일은 모든 페이지에서 동일하게 사용되는 "고정된" 헤더임.
    - 데이터가 필요 없으므로 파라미터 없이 정의함
    - th:fragment="header"
                   ------
                   fragment 이름 (파라미터 없음)
    - 언제 이 스타일1을 사용하는가?
      - 네비게이션 바 (모든 페이지에 동일)
      - 푸터 (모든 페이지에 동일)
      - 사이드바 (모든 페이지에 동일)
      -> 데이터가 필요 없고, 어디서든 같은 내용을 보여줄 때
-->
<header th:fragment="header" class="site-header" style="display: flex; flex-direction: column; padding: 0;">

    <div class="header-top-row" style="width: 100%; display: flex; justify-content: flex-end; padding: 10px 40px; background-color: #ffffff;">
        <nav class="menu" style="margin-top: 20px;">    <!-- 20px만큼 위를 띄움 -->
            <a href="#" th:href="@{/notification}" style="position: relative; display: inline-block; text-decoration: none;">
                알림⏰
                <!-- 새 메시지가 있을 때만 빨간 점 표시 (서버에서 newAlert 변수를 보내준다고 가정) -->
                <span
                      style="position: absolute; top: -5px; right: 50px; width: 12px; height: 12px; background-color: red; border-radius: 50%; border: 1px solid white;">
                </span>
            </a>
            <a href="#" th:href="@{/index}">로그인</a>
            <a href="#" th:href="@{/myPage}">마이페이지</a>
        </nav>
    </div>

    <!-- 하단 여백 (레이아웃 조절용) -->
    <div style="height: 13px;"></div>

    <!-- [두 번째 줄] 새 상단바: 사이드 메뉴 + 상세 메뉴 표시 -->
    <div class="header-second-row" style="width: 100%; background-color: #a8bacb; border-top: 1px solid #eee; border-bottom: 1px solid #eee; padding: 12px 40px;">
        <div class="breadcrumb" style="font-size: 14px; color: #666; display: flex; align-items: center;">

            <!-- 1. 고정 홈 아이콘/텍스트 -->
            <!--            <span style="color: #999;">홈</span>-->

            <!-- 2. 사이드 메뉴(대분류) 표시 -->
            <span style="color: #666;">
            <th:block th:if="${currentUri != null}">
<!--                <span style="margin: 0 10px; color: #ccc;">&gt;</span>-->
                <span th:if="${currentUri.startsWith('/hometop/notification')}">알람 목록</span>
                <span th:if="${currentUri.startsWith('/hometop/settings')}">시스템 설정</span>
                <span th:if="${currentUri == '/hometop/index'}">대시보드</span>
            </th:block>
        </span>

            <!-- 3. 상세 메뉴(소분류) 표시 (현재 페이지가 상세 페이지일 때만 출력) -->
            <th:block th:if="${currentUri != '/hometop/index' && currentUri != null}">
                <span style="margin: 0 10px; color: #ccc;">&gt;</span>
                <strong style="color: #333; font-weight: 700;">
                    <span th:if="${currentUri.startsWith('/hometop/notification')}">전체 보기</span>
                    <span th:if="${currentUri.startsWith('/hometop/user')}">사용자 관리</span>
                    <span th:if="${currentUri.startsWith('/hometop/settings')}">환경 설정</span>
                </strong>
            </th:block>

        </div>
    </div>

    <!--&lt;!&ndash; 2. [추가] 현재 경로 표시 텍스트 영역 &ndash;&gt;
    <div class="current-path" style="padding-left: 20px; font-size: 14px; color: #666;">
        <br>
        <br>
        <span>현재 위치: </span>
        &lt;!&ndash; 위에서 설정한 currentUri 변수 사용 &ndash;&gt;
        <strong th:text="${currentUri}"></strong>
    </div>-->

</header>
</body>
</html>
