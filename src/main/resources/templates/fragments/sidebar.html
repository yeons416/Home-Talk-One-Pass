<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<aside th:fragment="sidebar" class="sidebar" >
    <nav>

        <ul class="sidebar-menu" >
            <!-- 1. 로고 영역: 여백 추가 + 활성화 체크 -->
            <li style="margin-bottom: 30px;">
                <a th:href="@{/index}"
                   th:classappend="${menu == 'index'} ? 'active' : ''">
                    My Website
                </a>
            </li>

            <!-- 2. 메뉴 영역: 경로가 /notification으로 시작하면 강조 -->
            <li>
                <a th:href="@{/notification}"
                   th:classappend="${menu == 'notification'} ? 'active' : ''">
                    📚 알람 목록
                </a>
            </li>

            <!-- 3. 메뉴 영역: 경로가 /user로 시작하면 강조 -->
            <li>
                <a th:href="@{/user/management}"
                   th:classappend="${menu == 'management'} ? 'active' : ''">
                    👤 사용자 관리
                </a>
            </li>

            <!-- 4. 설정 메뉴 -->
            <li>
                <a th:href="@{/settings}"
                   th:classappend="${menu == 'settings'} ? 'active' : ''">
                    ⚙️ 설정
                </a>
            </li>
        </ul>
    </nav>
</aside>
</html>
