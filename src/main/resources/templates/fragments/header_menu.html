<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<!--
  * Fragment 스타일1 : 고정 레이아웃 (파라미터 없음)
    - 이 파일은 모든 페이지에서 동일하게 사용되는 "고정된" 헤더임.
    - 데이터가 필요 없으므로 파라미터 없이 정의함
    - th:fragment="header"
                   ------
                   fragment 이름 (파라미터 없음)
    - 언제 이 스타일1을 사용하는가?
      - 네비게이션 바 (모든 페이지에 동일)
      - 푸터 (모든 페이지에 동일)
      - 사이드바 (모든 페이지에 동일)
      -> 데이터가 필요 없고, 어디서든 같은 내용을 보여줄 때
-->
<header th:fragment="header_menu(currentPath01, currentPath02)" class="site-header" style="display: flex; flex-direction: column; padding: 0;">

    <div class="header-top-row" style="width: 100%; display: flex; justify-content: flex-end; padding: 10px 40px; background-color: #ffffff;">
        <nav class="menu" style="margin-top: 20px;">    <!-- 20px만큼 위를 띄움 -->
            <a href="#" th:href="@{/notification}" style="position: relative; display: inline-block; text-decoration: none;">
                알림⏰
                <!-- 새 메시지가 있을 때만 빨간 점 표시 (서버에서 newAlert 변수를 보내준다고 가정) -->
                <span
                      style="position: absolute; top: -5px; right: 50px; width: 12px; height: 12px; background-color: red; border-radius: 50%; border: 1px solid white;">
                </span>
            </a>
            <a href="#" th:href="@{/auth}">로그인</a>
            <a href="#" th:href="@{/myPage}">마이페이지</a>
        </nav>
    </div>

    <!-- 하단 여백 (레이아웃 조절용) -->
    <div style="height: 13px;"></div>

    <!-- [두 번째 줄] 새 상단바: 사이드 메뉴 + 상세 메뉴 표시 -->
    <div class="header-second-row" style="width: 100%; background-color: #a8bacb; border-top: 1px solid #eee; border-bottom: 1px solid #eee; padding: 12px 40px; min-height: 48px">
        <div class="breadcrumb" style="font-size: 14px; color: #0526ad; display: flex; align-items: center;">

            <!-- 1. 고정 홈 아이콘/텍스트 -->
            <!--            <span style="color: #999;">홈</span>-->

            <!-- 2. 사이드 메뉴(대분류) 표시 -->
            <span style="color: #0526ad; font-weight: 500">
                    <th:block th:if="${currentPath01 != null}">
<!--                    <span style="margin: 0 10px; color: #ccc;">&gt;</span>-->
                        <span th:if="${currentPath01 == 'auth'}">로그인</span>
                        <span th:if="${currentPath01 == 'notification'}">알람 목록</span>
                        <span th:if="${currentPath01 == 'parking'}">주차</span>
                        <span th:if="${currentPath01 == 'home'}">대시보드</span>

                     </th:block>
            </span>


            <!-- 3. 상세 메뉴(소분류) 표시 (현재 페이지가 상세 페이지일 때만 출력) -->
            <th:block th:if="${currentPath01 != 'home' && currentPath01 != null}">
                <span style="margin: 0 10px; color: #2ea5ef;">&gt;</span>
                <strong style="color: #0526ad; font-weight: 700;">

                    <!-- 알림 목록 -->
                    <th:block th:if="${currentPath01 == 'notification'}">
                        <span th:if="${currentPath02 == ''}">전체 보기</span>
                    </th:block>

                    <!-- 주차 목록 -->
                    <th:block th:if="${currentPath01 == 'parking'}">
                        <span th:if="${currentPath02 == 'status'}">조회</span>
                        <span th:if="${currentPath02 == 'register'}">등록</span>
                    </th:block>

                </strong>
            </th:block>

        </div>
    </div>
</header>
</html>
