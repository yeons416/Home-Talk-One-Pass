<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공지 상세</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --main-navy: #032154;
            --point-coral: #EB6E57;
            --bg-gray: #F4F7F9;
            --border-color: #E2E8F0;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-gray);
            padding: 20px;
            color: #333;
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 80%;
            margin: 20px auto;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .notice-table { width: 100%; border-collapse: collapse; }
        .notice-table td { padding: 10px 12px; border-bottom: 1px solid var(--border-color); font-size: 13px; }
        .notice-table td:first-child { width: 80px; text-align: center; }
        .notice-table td:nth-child(3), .notice-table td:nth-child(4) { width: 130px; text-align: center; color: #888; }
        .notice-table td:last-child { width: 80px; text-align: center; color: #888; }

        .badge-important span { background-color: rgb(174,34,41); border-radius: 15px; padding: 3px 12px; font-size: 11px; color: white; }
        .badge-facility span { background-color: rgb(201,106,37); border-radius: 15px; padding: 3px 12px; font-size: 11px; color: white; }
        .badge-safety span { background-color: rgb(39,139,88); border-radius: 15px; padding: 3px 12px; font-size: 11px; color: white; }
        .badge-normal span { background-color: rgb(59,65,105); border-radius: 15px; padding: 3px 12px; font-size: 11px; color: white; }

        .admin-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin: 12px 0;
        }

        .btn-edit {
            background: var(--main-navy);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 8px 18px;
            font-size: 13px;
            cursor: pointer;
            text-decoration: none;
        }

        .btn-delete {
            background: var(--point-coral);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 8px 18px;
            font-size: 13px;
            cursor: pointer;
        }

        .notice-box {
            min-height: 300px;
            padding: 20px;
            margin: 16px 0;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.8;
        }

        .notice-nav-table { width: 100%; border-collapse: collapse; margin-top: 16px; }
        .notice-nav-table td { padding: 10px 12px; border: 1px solid var(--border-color); font-size: 13px; }
        .notice-nav-table tr td:first-child { width: 60px; text-align: center; color: #888; background: #f9f9f9; }
        .notice-nav-table td:nth-child(3), .notice-nav-table td:nth-child(4) { width: 120px; text-align: center; color: #888; }
        .notice-nav-table td:last-child { width: 80px; text-align: center; color: #888; }
        .notice-nav-table a { text-decoration: none; color: #333; }
        .notice-nav-table a:hover { color: var(--point-coral); }
    </style>
</head>
<body>
<div th:replace="~{fragments/NoticePageHeader :: notice-page-header}"></div>

<div class="container">

    <table class="notice-table">
        <tr>
            <td th:class="'badge-' + ${notice.badge != null ? notice.badge.name().toLowerCase() : 'normal'}">
                <span th:text="${notice.badge != null ? notice.badge.label : '일반'}"></span>
            </td>
            <td th:text="${notice.title}">공지 제목</td>
            <td th:text="${#temporals.format(notice.createdAt, 'yyyy-MM-dd HH:mm')}">작성일시</td>
            <td th:text="${notice.updatedAt != null && !notice.updatedAt.toLocalDate().isEqual(notice.createdAt.toLocalDate()) ? #temporals.format(notice.updatedAt, 'yyyy-MM-dd HH:mm') : '-'}">수정일시</td>
            <td th:text="${notice.viewCount}">조회수</td>
        </tr>
    </table>

    <div class="admin-buttons">
        <a th:href="@{/notice/{id}/edit(id=${notice.id})}" class="btn-edit">수정</a>
        <form th:action="@{/notice/{id}/delete(id=${notice.id})}" method="post" style="display:inline;">
            <button type="button" class="btn-delete"
                    onclick="if(confirm('삭제하시겠습니까?')) this.form.submit()">삭제</button>
        </form>
    </div>

    <div class="notice-box">
        <p th:text="${notice.content}" style="white-space: pre-line;"></p>
    </div>

    <table class="notice-nav-table">
        <tr>
            <td>이전글</td>
            <th:block th:if="${preNotice != null}">
                <td><a th:href="@{/notice/{id}(id=${preNotice.id})}" th:text="${preNotice.title}"></a></td>
                <td th:text="${#temporals.format(preNotice.createdAt, 'yyyy-MM-dd')}"></td>
                <td th:text="${preNotice.updatedAt != null && !preNotice.updatedAt.toLocalDate().isEqual(preNotice.createdAt.toLocalDate()) ? #temporals.format(preNotice.updatedAt, 'yyyy-MM-dd') : '-'}"></td>
                <td th:text="${preNotice.viewCount}"></td>
            </th:block>
            <th:block th:if="${preNotice == null}">
                <td colspan="4"></td>
            </th:block>
        </tr>
        <tr>
            <td>다음글</td>
            <th:block th:if="${nextNotice != null}">
                <td><a th:href="@{/notice/{id}(id=${nextNotice.id})}" th:text="${nextNotice.title}"></a></td>
                <td th:text="${#temporals.format(nextNotice.createdAt, 'yyyy-MM-dd')}"></td>
                <td th:text="${nextNotice.updatedAt != null && !nextNotice.updatedAt.toLocalDate().isEqual(nextNotice.createdAt.toLocalDate()) ? #temporals.format(nextNotice.updatedAt, 'yyyy-MM-dd') : '-'}"></td>
                <td th:text="${nextNotice.viewCount}"></td>
            </th:block>
            <th:block th:if="${nextNotice == null}">
                <td colspan="4"></td>
            </th:block>
        </tr>
    </table>

</div>
</body>
</html>
