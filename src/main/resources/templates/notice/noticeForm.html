<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공지 작성</title>
    <style>

        .notice-title-wrap {
            border: 1px solid #ddd;
            padding: 0;
            display: flex;
            align-items: stretch;
        }

        .notice-title-wrap label {
            white-space: nowrap;
            font-size: 13px;
            padding: 8px 16px;
            border-right: 1px solid #ddd;
            background: #f5f5f5;
            display: flex;
            align-items: center;
        }

        .notice-title-wrap input {
            border: none;
            outline: none;
            width: 100%;
            font-size: 13px;
            padding: 8px 12px;
        }


        .notice-content-wrap {
            border: 1px solid #ddd;
            min-height: 400px;
            position: relative;
        }

        .notice-content {
            width: 100%;
            min-height: 400px;
            border: none;
            outline: none;
            padding: 12px;
            resize: none;
            font-size: 14px;
            box-sizing: border-box;
        }


        .schedule-modal {
            display: none;
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: white;
            border-radius: 16px;
            width: 300px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
        }

        .schedule-modal.open { display: block; }

        .modal-header {
            background: #1a1c2e;
            color: white;
            padding: 14px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            font-weight: 500;
        }

        .modal-header button {
            background: none;
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            border-radius: 6px;
            width: 24px; height: 24px;
            cursor: pointer;
            font-size: 11px;
        }

        .modal-body { padding: 16px; }

        .modal-table {
            width: 100%;
            border-collapse: collapse;
        }

        .modal-table td {
            padding: 6px 4px;
            font-size: 13px;
            vertical-align: middle;
        }

        .modal-table td:first-child {
            white-space: nowrap;
            width: 50px;
            color: #444;
        }

        .modal-table input[type="text"],
        .modal-table input[type="date"] {
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 3px 6px;
            font-size: 12px;
        }

        .modal-table input[type="text"] { width: 100%; }

        .modal-table select {
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 3px 4px;
            font-size: 12px;
        }

        .modal-table textarea {
            width: 100%;
            height: 60px;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 4px;
            font-size: 12px;
            resize: none;
            box-sizing: border-box;
        }

        .modal-bottom {
            text-align: right;
            margin-top: 10px;
        }

        .btn-register {
            background: #51587e;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 6px 16px;
            font-size: 13px;
            cursor: pointer;
        }


        .notice-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        .notice-bottom button,
        .notice-bottom label.btn-file {
            background: #3b4169;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 8px 20px;
            cursor: pointer;
            font-size: 13px;
        }

        .notice-bottom input[type="file"] { display: none; }
        .notice-bottom input[type="checkbox"] { margin-right: 4px; }

        .notice-bottom-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }
    </style>
</head>
<body>
<div th:replace="fragments/noticeHeader :: notice-page-header"></div>


<div class="notice-title-wrap">
    <label for="title">제목</label>
    <input type="text" id="title" name="title">
</div>


<div class="notice-content-wrap">
    <textarea name="content" class="notice-content"></textarea>


    <div class="schedule-modal" id="scheduleModal">
        <div class="modal-header">
            <span>일정 등록</span>
            <button type="button"
                    onclick="document.getElementById('scheduleModal').classList.remove('open')">X</button>
        </div>
        <div class="modal-body">
            <table class="modal-table">
                <tr>
                    <td>일정명</td>
                    <td><input type="text" name="scheduleName" placeholder="일정명을 입력하세요."></td>
                </tr>
                <tr>
                    <td>시작</td>
                    <td>
                        <input type="date" name="startDate">
                        <select name="startHour"><option>00</option></select>
                        <select name="startMinute"><option>00</option></select>
                    </td>
                </tr>
                <tr>
                    <td>종료</td>
                    <td>
                        <input type="date" name="endDate">
                        <select name="endHour"><option>23</option></select>
                        <select name="endMinute"><option>59</option></select>
                    </td>
                </tr>
                <tr>
                    <td>설명</td>
                    <td><textarea name="scheduleDesc"></textarea></td>
                </tr>
            </table>
            <div class="modal-bottom">
                <button type="button" class="btn-register">등록</button>
            </div>
        </div>
    </div>
</div>


<div class="notice-bottom">
    <div>
        <input type="file" id="file" name="file">
        <label for="file" class="btn-file">파일 올리기</label>
    </div>
    <div class="notice-bottom-right">
        <input type="checkbox" id="pinned" name="pinned">
        <label for="pinned">상단 고정</label>
        <button type="button" class="btn-schedule"
                onclick="document.getElementById('scheduleModal').classList.add('open')">일정 등록</button>
        <button type="button" class="btn-submit">게시</button>
    </div>
</div>

</body>
</html>
