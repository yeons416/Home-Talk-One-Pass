<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공지 목록</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --main-navy: #032154;
            --point-coral: #EB6E57;
            --bg-gray: #F4F7F9;
            --border-color: #E2E8F0;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-gray);
            padding: 20px;
            color: #333;
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 80%;
            margin: 20px auto;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        .top-bar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 10px;
        }

        .btn-write {
            background: var(--main-navy);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 8px 18px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
        }

        .btn-write:hover { background-color: #051a3a; }

        .notice-list { width: 100%; border-collapse: collapse; }

        .notice-list th {
            background: var(--main-navy);
            color: white;
            padding: 10px 12px;
            font-size: 13px;
            text-align: center;
        }

        .notice-list td {
            border-bottom: 1px solid var(--border-color);
            padding: 10px 12px;
            font-size: 13px;
        }

        .notice-list td:first-child { text-align: center; width: 80px; }
        .notice-list td:nth-child(3), .notice-list td:nth-child(4), .notice-list td:nth-child(5) { text-align: center; width: 120px; }
        .notice-list td a { text-decoration: none; color: #222; }
        .notice-list td a:hover { color: var(--point-coral); }
        .notice-list tr:hover { background-color: #f9f9f9; }

        .badge-important span { background-color: rgb(174, 34, 41); border-radius: 15px; padding: 3px 12px; font-size: 11px; color: white; }
        .badge-facility span { background-color: rgb(201, 106, 37); border-radius: 15px; padding: 3px 12px; font-size: 11px; color: white; }
        .badge-normal span { background-color: rgb(59, 65, 105); border-radius: 15px; padding: 3px 12px; font-size: 11px; color: white; }
        .badge-safety span { background-color: rgb(39, 139, 88); border-radius: 15px; padding: 3px 12px; font-size: 11px; color: white; }

        .bottom-wrap {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            margin-top: 20px;
        }

        .pagination { display: flex; justify-content: center; gap: 6px; }
        .pagination a { text-decoration: none; color: #333; padding: 4px 10px; font-size: 13px; border-radius: 4px; }
        .pagination a:hover { color: var(--point-coral); }
        .active-page { font-weight: bold; color: var(--main-navy) !important; }

        .notice-search { display: flex; align-items: center; gap: 6px; position: absolute; right: 0; }
        .notice-search input {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 13px;
            outline: none;
        }
        .notice-search input:focus { border-color: var(--main-navy); }

        .btn-search {
            background-color: var(--main-navy);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 13px;
        }
        .btn-search:hover { background-color: #051a3a; }
    </style>
</head>
<body>
<div th:replace="~{fragments/NoticePageHeader :: notice-page-header}"></div>

<div class="container">

    <div class="top-bar">
        <a th:href="@{/notice/write}" class="btn-write">작성하기</a>
    </div>

    <table class="notice-list">
        <thead>
        <tr>
            <th>분류</th>
            <th>제목</th>
            <th>게시일시</th>
            <th>수정일시</th>
            <th>조회수</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="notice : ${notices.content}">
            <td th:class="'badge-' + ${notice.badge != null ? notice.badge.name().toLowerCase() : 'normal'}">
                <span th:text="${notice.badge != null ? notice.badge.label : '일반'}">분류</span>
            </td>
            <td>
                <a th:href="@{/notice/{id}(id=${notice.id})}" th:text="${notice.title}">제목</a>
            </td>
            <td th:text="${#temporals.format(notice.createdAt, 'yyyy-MM-dd')}"></td>
            <td th:text="${notice.updatedAt != null && !notice.updatedAt.toLocalDate().isEqual(notice.createdAt.toLocalDate()) ? #temporals.format(notice.updatedAt, 'yyyy-MM-dd') : '-'}"></td>
            <td th:text="${notice.viewCount}"></td>
        </tr>
        </tbody>
    </table>

    <div class="bottom-wrap">
        <div class="pagination">
            <a th:if="${currentPage > 0}"
               th:href="@{/notice(page=${currentPage - 1}, keyword=${keyword != null ? keyword : ''})}">&lt;</a>

            <a th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
               th:href="@{/notice(page=${i}, keyword=${keyword != null ? keyword : ''})}"
               th:text="${i + 1}"
               th:classappend="${i == currentPage} ? 'active-page'"></a>

            <a th:if="${currentPage < totalPages - 1}"
               th:href="@{/notice(page=${currentPage + 1}, keyword=${keyword != null ? keyword : ''})}">&gt;</a>
        </div>
        <form th:action="@{/notice}" method="get" class="notice-search">
            <input type="text" name="keyword" th:value="${keyword}" placeholder="제목 검색">
            <button type="submit" class="btn-search">🔍</button>
        </form>
    </div>
</div>

</body>
</html>
