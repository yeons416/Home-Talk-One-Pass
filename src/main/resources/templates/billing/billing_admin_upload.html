<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>고지서 업로드 - HomeTalkOnePass</title>

    <meta name="_csrf"        th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />

    <link rel="stylesheet" th:href="@{/css/dashboard/style.css}" />
    <link rel="stylesheet" th:href="@{/billing/css/billing_common.css}" />
    <link rel="stylesheet" th:href="@{/billing/css/billing_admin_upload.css}" />
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>

<div class="main-layout" style="display:flex; min-height:100vh;">
    <div th:replace="~{fragments/sidebar :: sidebar}" th:with="menu='billing'"></div>

    <div class="main-wrapper" style="flex:1; display:flex; flex-direction:column;">
        <div th:replace="~{fragments/header :: header}"></div>

        <!-- 카테고리 바 위치 (빈 바 고정) -->
        <header class="category-menu-bar">&nbsp;</header>

        <!-- 메인 콘텐츠 -->
        <div class="main-content">

            <div class="page-title">고지서 업로드</div>

            <!-- 업로드 존 -->
            <div class="upload-zone" id="uploadZone">
                <div class="upload-icon">↑</div>
                <div class="upload-title">엑셀 파일을 드래그하거나 클릭하여 업로드</div>
                <div class="upload-hint">.xlsx 표준 엑셀 파일</div>
                <input type="file" id="fileInput" accept=".xlsx,.csv" style="display:none" />
            </div>

            <!-- 중복 확인 팝업 -->
            <div class="confirm-overlay" id="dupOverlay" style="display:none">
                <div class="confirm-box">
                    <div class="confirm-title">이미 데이터가 존재합니다.</div>
                    <div class="confirm-msg">해당 월 고지서가 이미 업로드되어 있습니다.</div>
                    <div class="confirm-msg-warn">덮어쓰면 기존 데이터가 갱신됩니다. (변경불가)</div>
                    <div class="confirm-btns">
                        <button class="btn btn-ghost" onclick="cancelDup()">취소</button>
                        <button class="btn btn-point" onclick="confirmDup()">확인</button>
                    </div>
                </div>
            </div>

            <!-- 필터 (업로드 후 표시) -->
            <div class="filter-row" id="filterBar" style="display:none">
                <div class="panel-wrap">
                    <button class="filter-btn" id="btnYear" onclick="togglePanel('year')">
                        <span id="lblYear">2026년</span><span class="caret">▼</span>
                    </button>
                    <div class="filter-panel" id="panelYear" style="display:none">
                        <div class="chip-grid year-g" id="yearGrid"></div>
                    </div>
                </div>
                <div class="panel-wrap">
                    <button class="filter-btn" id="btnMonth" onclick="togglePanel('month')">
                        <span id="lblMonth">전체 월</span><span class="caret">▼</span>
                    </button>
                    <div class="filter-panel" id="panelMonth" style="display:none">
                        <div class="chip-grid month-g" id="monthGrid"></div>
                    </div>
                </div>
                <div class="panel-wrap">
                    <button class="filter-btn" id="btnDong" onclick="togglePanel('dong')">
                        <span id="lblDong">전체 동</span><span class="caret">▼</span>
                    </button>
                    <div class="filter-panel" id="panelDong" style="display:none">
                        <div class="chip-grid dong-g" id="dongGrid"></div>
                    </div>
                </div>
            </div>

            <!-- 유효성 검사 + 미리보기 테이블 -->
            <div class="table-section" id="tableSection" style="display:none">
                <div class="table-header-row">
                    <div class="table-header-title">유효성 검사 + 고지서 미리보기 + 업로드 확정</div>
                    <div class="table-header-meta" id="tableMeta"></div>
                </div>
                <div class="table-wrap">
                    <table class="data-table">
                        <thead>
                        <tr>
                            <th>NUM</th>
                            <th>동/호</th>
                            <th>household_id</th>
                            <th class="sortable" onclick="sortBy('billing_month')">부과월 <span class="sort-icon">▼</span></th>
                            <th class="sortable" onclick="sortBy('total_amount')">청구금액 <span class="sort-icon">▼</span></th>
                            <th class="sortable" onclick="sortBy('valid')">검증 <span class="sort-icon">▼</span></th>
                            <th>고지서 미리보기</th>
                            <th class="sortable" onclick="sortBy('upsertType')">비고 (UPSERT) <span class="sort-icon">▼</span></th>
                        </tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
                <div class="table-footer">
                    <div class="table-summary" id="tableSummary"></div>
                    <div class="table-actions">
                        <button class="btn btn-ghost" onclick="cancelUpload()">취소</button>
                        <button class="btn-confirm-upload disabled" id="btnConfirm" onclick="confirmUpload()">업로드 확정 ↑</button>
                    </div>
                </div>
            </div>

            <!-- 업로드 완료 배너 -->
            <div class="upload-done-banner" id="uploadDoneBanner" style="display:none">
                <span class="done-icon">✓</span>
                <span id="uploadDoneMsg"></span>
            </div>

        </div><!-- /main-content -->

        <footer th:replace="~{fragments/footer :: footer}"></footer>

    </div><!-- /main-wrapper -->
</div><!-- /main-layout -->

<!-- 고지서 미리보기 모달 -->
<div class="modal-overlay" id="previewOverlay" style="display:none" onclick="closePreview(event)">
    <div class="modal-box">
        <div class="modal-header">
            <span class="modal-header-title" id="modalHeaderTitle">고지서 미리보기</span>
            <button class="modal-close-btn" onclick="closePreviewBtn()">✕</button>
        </div>
        <div class="modal-body">
            <div class="bill-head">
                <div class="bill-head-title">관리비 고지서</div>
                <div class="bill-head-sub" id="modalPeriod"></div>
            </div>
            <div class="bill-col-hint">항목명</div>
            <div class="bill-rows" id="modalRows"></div>
            <div class="bill-total-row">
                <span class="bill-total-label">합계</span>
                <span class="bill-total-amount" id="modalTotal"></span>
            </div>
            <div class="bill-preview-note">✱ 입주민에게 보여지는 화면과 동일한 미리보기입니다.</div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-ghost" onclick="closePreviewBtn()">닫기</button>
        </div>
    </div>
</div>


<script th:inline="javascript">
    /*<![CDATA[*/
    const CONTEXT_PATH = /*[[${contextPath}]]*/ '/hometalk';
    const CSRF_TOKEN   = document.querySelector('meta[name="_csrf"]')?.content;
    const CSRF_HEADER  = document.querySelector('meta[name="_csrf_header"]')?.content;
    /*]]>*/
</script>
<script th:src="@{/billing/js/billing_upload.js}"></script>

</body>
</html>
