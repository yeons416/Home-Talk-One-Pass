<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<style>
    .pagination-container {
        display: flex;
        justify-content: center;
        margin-top: 2rem;
    }

    .pagination {
        display: flex;
        list-style: none;
        gap: 8px;
        padding: 0;
    }

    .page-item .page-link {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 38px;
        height: 38px;
        border: 1px solid #9EBFDB;
        border-radius: 8px;
        text-decoration: none;
        color: #4073C9;
        font-weight: 500;
        transition: all 0.2s;
    }

    .page-item.active .page-link {
        background-color: #EB6E57;
        border-color: #EB6E57;
        color: white;
    }

    .page-item.disabled .page-link {
        color: #ccc;
        pointer-events: none;
        background-color: #f8f9fa;
        border-color: #ddd;
    }

    .page-item:hover:not(.active):not(.disabled) .page-link {
        background-color: #7ED3D9;
        border-color: #7ED3D9;
        color: white;
    }
</style>

<div th:fragment="pagination(page, boardCode, categoryCode)">
    <div th:if="${!page.isEmpty()}" class="pagination-container">
        <nav aria-label="Page navigation">
            <ul class="pagination">

                <li class="page-item" th:classappend="${!page.hasPrevious()} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/community/{boardCode}/{categoryCode}(boardCode=${boardCode}, categoryCode=${categoryCode}, page=${page.number})}"
                       aria-label="Previous">
                        <span aria-hidden="true">&laquo;</span>
                    </a>
                </li>

                <li class="page-item"
                    th:each="pageNumber : ${#numbers.sequence(1, page.totalPages)}"
                    th:classappend="${pageNumber == page.number + 1} ? 'active'">
                    <a class="page-link"
                       th:href="@{/community/{boardCode}/{categoryCode}(boardCode=${boardCode}, categoryCode=${categoryCode}, page=${pageNumber})}"
                       th:text="${pageNumber}">1</a>
                </li>

                <li class="page-item" th:classappend="${!page.hasNext()} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/community/{boardCode}/{categoryCode}(boardCode=${boardCode}, categoryCode=${categoryCode}, page=${page.number + 2})}"
                       aria-label="Next">
                        <span aria-hidden="true">&raquo;</span>
                    </a>
                </li>

            </ul>
        </nav>
    </div>
</div>
</html>
