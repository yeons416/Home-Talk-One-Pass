<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeTOP Community</title>        <!-- 제목도 게시판에 따라 변경되도록 -->
    <link rel="stylesheet" th:href="@{/css/community/common.css}">
    <link rel="stylesheet" href="/css/community/poststyle.css" th:href="@{/css/community/post-form.css}">
</head>
<body>
<div th:replace="~{community/fragments/boardListHeader :: boardListHeader(boards=${boards}, boardId=${boardId})}"></div>
<div th:replace="~{community/fragments/categoryBanner :: categoryBanner(board=${board}, categories=${categories}, categoryId=${categoryId})}"></div>

<div class="content-container">
    <div class="form-top-actions">
        <button type="button" id="btnLoadTemp" class="btn-sub" th:data-board-code="${boardCode}">
            임시저장 목록 (<span th:text="${tempCount}">0</span>)
        </button>
    </div>

    <form th:action="@{/community/{code}/save(code=${board.code})}" method="post" id="postForm" th:object="${post}">
        <input type="hidden" th:field="*{id}">
        <input type="hidden" name="isTemp" id="isTemp" value="false">
        <div class="page-body">
            <div class="form-group tag-group">
                <span class="form-label">태그: </span>
                <label><input type="checkbox" name="tags" value="공지"> 공지</label>
                <label><input type="checkbox" name="tags" value="질문"> 질문</label>
                <label><input type="checkbox" name="tags" value="정보"> 정보</label>
            </div>

            <div class="form-inline-group">
                <div class="category-field">
                    <select th:field="*{categoryId}" required class="category-select">
                        <option value="">카테고리 선택</option>
                        <option th:each="category : ${categories}" th:value="${category.id}"
                                th:text="${category.name}">카테고리 명</option>
                    </select>
                </div>

                <div class="title-field">
                    <input type="text" id="title" th:field="*{title}" placeholder="제목을 입력하세요 (최대 50자)"
                           maxlength="50" required class="input-control">
                    <span class="char-limit"><span id="charCount">0</span>/50</span>
                </div>
            </div>


            <div class="editor-wrapper">
                <div class="editor-header">
                    <small>에디터 툴바 영역 (폰트, 정렬 등 구현 예정)</small>
                </div>
                <textarea th:field="*{content}" rows="18" placeholder="내용을 입력하세요" required></textarea>
            </div>
        </div>

        <div class="page-footer">
            <div class="left-box">
                <a th:href="@{/community/{code}(code=${board.code})}" onclick="return confirmCancel()"
                    class="btn-cancel">취소</a>
            </div>

            <div class="right-box">
                <button type="button" th:if="${post.id == null}"
                        id="btnSaveTemp" th:data-board-code="${boardCode}">임시저장</button>
                <button type="submit" onclick="document.getElementById('isTemp').value='false'">등록</button>
            </div>
        </div>
    </form>
</div>

<div id="tempListModal" style="display:none;" class="temp-modal">
    <div class="modal-content">
        <h3>임시저장 글 <span class="close-modal">&times;</span></h3>
        <ul id="tempListArea">
        </ul>
    </div>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<script th:src="@{/js/community/post.js}" defer></script>
</body>
</html>
